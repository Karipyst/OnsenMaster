<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>温泉マップ</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">

<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

<style>
:root{
  --accent:#34c759;
  --blue:#007aff;
  --danger:#ff3b30;
  --text:#1f2937;
  --sub:#6b7280;
  --card-bg:rgba(255,255,255,.14);
  --border:rgba(255,255,255,.18);
  --sheet-translate:calc(100% + 24px);
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI",sans-serif;
  background:#f2f2f7;
  color:var(--text);
  overflow:hidden;
}
button,input,select{font:inherit;}
button{touch-action:manipulation;}

#loading{
  position:fixed;inset:0;
  display:flex;justify-content:center;align-items:center;
  background:rgba(0,0,0,0.25);
  opacity:0;pointer-events:none;transition:.3s;
  z-index:2000;
}
#loading.active{opacity:1;pointer-events:auto;}
.spinner{
  width:40px;height:40px;
  border:4px solid #fff;border-top:4px solid transparent;
  border-radius:50%;animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

#auth{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:
    linear-gradient(rgba(0,0,0,.35), rgba(0,0,0,.48)),
    url("./login-bg.JPG") center center / cover no-repeat;
  z-index:1000;
  transition:.6s;
}
.auth-card{
  backdrop-filter:blur(20px);
  background:var(--card-bg);
  border:1px solid var(--border);
  padding:30px;
  border-radius:22px;
  width:min(340px, calc(100vw - 32px));
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.22);
}
.auth-card h3{margin:0 0 8px;color:#fff;font-size:26px;}
.auth-card p{margin:0 0 20px;color:rgba(255,255,255,.84);font-size:14px;}
.auth-card form{display:flex;flex-direction:column;gap:10px;}
.auth-card input,
.auth-card button{
  width:100%;
  padding:13px 14px;
  border-radius:12px;
  border:none;
  font-size:16px;
}
.auth-card input{background:rgba(255,255,255,.92);}
.auth-card button{background:var(--accent);color:#fff;font-weight:700;cursor:pointer;}
.auth-card .auth-hint{margin-top:10px;color:rgba(255,255,255,.75);font-size:12px;}

#app{
  position:fixed;
  inset:0;
  opacity:0;
  transform:translateY(20px) scale(.98);
  transition:opacity .6s ease, transform .6s ease;
}
#map{position:fixed;top:0;width:100%;height:65vh;}
.main{margin-top:65vh;padding:12px 12px calc(80px + env(safe-area-inset-bottom));}
.selected-panel{background:#fff;border-radius:16px;box-shadow:0 8px 28px rgba(15,23,42,.08);padding:12px;}
.selected-title{font-size:14px;font-weight:700;margin-bottom:10px;}
#selected{max-height:220px;overflow-y:auto;}
.empty-note{color:var(--sub);font-size:14px;padding:8px 4px;}
.selected-item{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:10px;margin:6px 0;background:#f8fafc;border-radius:12px;transition:.25s;cursor:pointer;}
.selected-item-info{display:flex;flex-direction:column;gap:3px;min-width:0;}
.selected-item-title{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.selected-item-meta{font-size:12px;color:var(--sub);}
.remove-btn{width:28px;height:28px;min-width:28px;border-radius:50%;background:#e5e7eb;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;}

.footer{
  position:fixed;bottom:0;left:0;width:100%;display:flex;justify-content:space-around;align-items:center;
  background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);border-top:1px solid #ddd;z-index:1000;
  padding-bottom:env(safe-area-inset-bottom);height:calc(60px + env(safe-area-inset-bottom));
}
.icon-btn{flex:1;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;border:none;background:none;padding:0;font-size:10px;color:#333;cursor:pointer;}
.icon-btn svg{width:22px;height:22px;stroke:#333;fill:none;stroke-width:2;}
.icon-btn span{margin-top:2px;}
.icon-btn.active svg{stroke:var(--accent);}
.route-btn svg{stroke:var(--blue);}
.opt-btn svg{stroke:var(--accent);}
.clear-btn svg{stroke:var(--danger);}

.menu-toggle{
  position:fixed;top:max(16px, env(safe-area-inset-top));left:16px;z-index:1300;width:46px;height:46px;border:none;border-radius:16px;
  background:rgba(255,255,255,.94);backdrop-filter:blur(12px);box-shadow:0 12px 28px rgba(15,23,42,.18);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.menu-toggle svg{width:22px;height:22px;stroke:#111827;fill:none;stroke-width:2;}
.side-menu{
  position:fixed;inset:0 auto 0 0;width:min(390px, 90vw);height:100dvh;background:#fff;z-index:1500;
  transform:translateX(-100%);transition:transform .35s ease;box-shadow:10px 0 28px rgba(0,0,0,.18);display:flex;flex-direction:column;
}
.side-menu.open{transform:translateX(0);}
.menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,.28);opacity:0;pointer-events:none;transition:opacity .25s ease;z-index:1400;}
.menu-overlay.show{opacity:1;pointer-events:auto;}
.menu-header{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:18px 16px 14px;border-bottom:1px solid #eef2f7;}
.menu-header h3{margin:0;font-size:20px;}
.menu-close{border:none;background:#f3f4f6;width:36px;height:36px;border-radius:12px;cursor:pointer;}
.menu-scroll{overflow-y:auto;padding:14px 14px 28px;}
.menu-block{margin-bottom:14px;background:#f8fafc;border:1px solid #eef2f7;border-radius:16px;padding:12px;overflow:hidden;}
.menu-block h4{margin:0 0 10px;font-size:14px;}
.menu-grid{display:grid;gap:10px;min-width:0;}
.menu-grid input,.menu-grid select{width:100%;max-width:100%;min-width:0;padding:11px 12px;border-radius:12px;border:1px solid #dbe2ea;background:#fff;}
.filter-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;min-width:0;}
.filter-grid select{width:100%;max-width:100%;min-width:0;}
.filter-tools{display:grid;gap:10px;margin-top:10px;}
.full-width{width:100%;}
.filter-summary{font-size:12px;color:#475569;background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:10px 12px;line-height:1.5;}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.stat-chip{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:10px;font-size:12px;text-align:center;}
.stat-chip strong{display:block;font-size:16px;color:#111827;}

.summary-sub{margin:12px 0 10px;color:#667085;font-size:12px;line-height:1.6;}
.summary-legend{display:flex;gap:8px;margin:0 0 12px;flex-wrap:wrap;}
.summary-legend span{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:56px;height:28px;padding:0 12px;border-radius:999px;
  background:rgba(255,255,255,.72);border:1px solid rgba(255,255,255,.7);
  color:#516071;font-size:11px;font-weight:700;
  box-shadow:0 6px 18px rgba(15,23,42,.06), inset 0 1px 0 rgba(255,255,255,.95);
  backdrop-filter:blur(14px);
}
.summary-matrix-wrap{
  position:relative;overflow:hidden;
  background:linear-gradient(180deg,rgba(255,255,255,.82) 0%,rgba(248,250,252,.92) 100%);
  border:1px solid rgba(255,255,255,.78);border-radius:24px;padding:11px;
  box-shadow:0 14px 32px rgba(15,23,42,.07), inset 0 1px 0 rgba(255,255,255,.95);
  backdrop-filter:blur(22px);
}
.summary-matrix-wrap::after{
  content:'';position:absolute;inset:0;border-radius:26px;pointer-events:none;
  background:linear-gradient(135deg,rgba(255,255,255,.28),rgba(255,255,255,0) 44%);
}
.summary-matrix{
  position:relative;z-index:1;
  display:grid;grid-template-columns:minmax(84px,1.12fr) repeat(3,minmax(58px,1fr));
  gap:7px;align-items:stretch;
}
.summary-corner,
.summary-col-head,
.summary-row-head,
.summary-cell{
  border-radius:18px;
}
.summary-corner,
.summary-col-head{
  min-height:38px;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.68);border:1px solid rgba(255,255,255,.86);
  color:#5d6b7a;font-size:11px;font-weight:800;letter-spacing:.03em;
  box-shadow:0 8px 20px rgba(15,23,42,.05), inset 0 1px 0 rgba(255,255,255,.96);
  backdrop-filter:blur(16px);
}
.summary-corner{
  justify-content:flex-start;padding:0 14px;
  background:linear-gradient(135deg,rgba(255,255,255,.76) 0%,rgba(244,247,255,.92) 100%);
}
.summary-row-head{
  min-height:54px;padding:0 12px;display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,.74);border:1px solid rgba(255,255,255,.88);
  box-shadow:0 10px 24px rgba(15,23,42,.06), inset 0 1px 0 rgba(255,255,255,.96);
  backdrop-filter:blur(18px);
  font-size:12px;font-weight:800;color:#18212b;line-height:1.25;
}
.summary-row-dot{
  width:10px;height:10px;min-width:10px;border-radius:999px;display:inline-block;
  box-shadow:0 0 0 5px rgba(255,255,255,.92), 0 6px 12px rgba(15,23,42,.12);
}
.summary-cell{
  position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.56);cursor:pointer;isolation:isolate;
  min-height:54px;padding:8px 6px 7px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  box-shadow:0 12px 24px rgba(15,23,42,.09), inset 0 1px 0 rgba(255,255,255,.42);
  transition:transform .18s ease, box-shadow .18s ease, filter .18s ease, border-color .18s ease;
  backdrop-filter:blur(10px);
}
.summary-cell::before{
  content:'';position:absolute;inset:1px;border-radius:17px;
  background:linear-gradient(180deg,rgba(255,255,255,.28),rgba(255,255,255,.04) 42%,rgba(255,255,255,0));
  z-index:-1;
}
.summary-cell::after{
  content:'';position:absolute;left:12%;right:12%;top:8px;height:34%;border-radius:999px;
  background:rgba(255,255,255,.18);filter:blur(8px);pointer-events:none;
}
.summary-cell:hover{
  transform:translateY(-1px);
  box-shadow:0 16px 28px rgba(15,23,42,.12), inset 0 1px 0 rgba(255,255,255,.52);
  filter:saturate(1.04) brightness(1.01);
  border-color:rgba(255,255,255,.82);
}
.summary-cell:active{transform:scale(.985);}
.summary-cell span:first-child{
  position:relative;z-index:1;
  font-size:18px;font-weight:800;line-height:1;color:#17212b;
  text-shadow:0 1px 0 rgba(255,255,255,.16);
}
.summary-cell-label{
  position:relative;z-index:1;
  font-size:10px;font-weight:700;letter-spacing:.02em;color:rgba(23,33,43,.72);
}
.summary-cell.active{
  border-color:rgba(17,24,39,.86);
  box-shadow:0 16px 30px rgba(15,23,42,.15), 0 0 0 3px rgba(255,255,255,.86), 0 0 0 5px rgba(17,24,39,.12);
  transform:translateY(-1px);
}
@media (max-width:520px){
  .summary-matrix-wrap{padding:9px;border-radius:22px;}
  .summary-matrix{grid-template-columns:minmax(72px,1fr) repeat(3,minmax(50px,1fr));gap:5px;}
  .summary-row-head{min-height:50px;padding:0 9px;font-size:11px;gap:8px;}
  .summary-cell{min-height:50px;padding:7px 4px 6px;}
  .summary-cell span:first-child{font-size:17px;}
  .summary-cell-label{font-size:9px;}
  .summary-corner,.summary-col-head{min-height:34px;font-size:9px;padding-inline:8px;}
  .filter-grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;}
}
.menu-note{margin-top:8px;color:var(--sub);font-size:12px;line-height:1.5;}
.onsen-list{display:flex;flex-direction:column;gap:10px;}
.onsen-item{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:12px;display:flex;flex-direction:column;gap:10px;}
.onsen-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.onsen-name{font-weight:700;font-size:15px;}
.onsen-type{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--sub);margin-top:4px;}
.onsen-type-dot{width:10px;height:10px;border-radius:50%;display:inline-block;}
.onsen-tags{display:flex;flex-wrap:wrap;gap:6px;justify-content:flex-end;}
.tag-mini{height:26px;padding:0 10px;border-radius:999px;border:1px solid #e5e7eb;background:#f8fafc;font-size:11px;display:inline-flex;align-items:center;}
.onsen-mini{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px 10px;font-size:12px;color:#374151;}
.onsen-mini div{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.onsen-actions{display:flex;gap:8px;flex-wrap:wrap;}
.ghost-btn,.solid-btn,.subtle-btn{
  flex:1;min-width:0;height:38px;border-radius:12px;border:none;cursor:pointer;font-weight:700;
}
.ghost-btn{background:#eef2ff;color:#1d4ed8;}
.solid-btn{background:var(--accent);color:#fff;}
.solid-btn.is-selected{background:#111827;}
.subtle-btn{background:#f3f4f6;color:#111827;}
.no-result{color:var(--sub);text-align:center;padding:18px 8px;font-size:14px;}

.popup-card{min-width:180px;display:flex;flex-direction:column;gap:10px;}
.popup-title{font-size:14px;font-weight:800;}
.popup-meta{font-size:12px;color:#6b7280;}
.popup-actions{display:flex;gap:8px;}
.popup-actions button{flex:1;height:34px;border:none;border-radius:10px;font-weight:700;cursor:pointer;}
.popup-pick{background:var(--accent);color:#fff;}
.popup-detail{background:#eef2ff;color:#1d4ed8;}

.detail-sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:1600;background:rgba(255,255,255,.98);backdrop-filter:blur(18px);
  border-top-left-radius:24px;border-top-right-radius:24px;box-shadow:0 -16px 40px rgba(15,23,42,.18);
  transform:translateY(var(--sheet-translate));transition:transform .35s ease;max-height:min(78dvh, 680px);display:flex;flex-direction:column;touch-action:none;
}
.detail-sheet.open{transform:translateY(0);}
.detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.2);opacity:0;pointer-events:none;transition:opacity .25s ease;z-index:1550;}
.detail-overlay.show{opacity:1;pointer-events:auto;}
.detail-head{position:sticky;top:0;background:linear-gradient(rgba(255,255,255,.98), rgba(255,255,255,.95));padding:10px 16px 8px;border-bottom:1px solid #eef2f7;cursor:grab;touch-action:none;}
.detail-head.dragging{cursor:grabbing;}
.detail-handle{width:44px;height:5px;background:#d1d5db;border-radius:999px;margin:0 auto 10px;}
.detail-title-row{display:flex;align-items:center;justify-content:space-between;gap:12px;}
.detail-title{font-size:20px;font-weight:800;margin:0;}
.detail-close{width:38px;height:38px;border:none;border-radius:12px;background:#f3f4f6;cursor:pointer;font-size:20px;}
.detail-body{overflow-y:auto;padding:16px 16px calc(22px + env(safe-area-inset-bottom));}
.detail-badges{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 14px;}
.detail-badge{display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 12px;border-radius:999px;background:#f8fafc;border:1px solid #e5e7eb;font-size:13px;}
.detail-section{background:#f8fafc;border:1px solid #eef2f7;border-radius:16px;padding:14px;margin-bottom:12px;}
.detail-section h4{margin:0 0 10px;font-size:14px;}
.detail-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;}
.detail-field{min-width:0;}
.detail-label{display:block;font-size:12px;color:var(--sub);margin-bottom:5px;}
.detail-value{font-size:14px;color:#111827;line-height:1.55;word-break:break-word;}
.detail-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;}
.detail-link{display:inline-flex;align-items:center;justify-content:center;width:100%;height:42px;border-radius:12px;background:#111827;color:#fff;text-decoration:none;font-weight:700;}

@media (max-width:520px){
  .detail-grid,.filter-grid{grid-template-columns:1fr;}
}
@media (max-width:400px){
  .icon-btn span{display:none;}
}
.mobile #map{height:100dvh;}
.mobile .main{display:none;}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div></div>
<div id="auth">
  <div class="auth-card">
    <h3>Sommelier Map</h3>
    <p>Enterキーでもログインできます</p>
    <form onsubmit="event.preventDefault(); login();">
      <input type="password" id="pw" placeholder="パスワード" autocomplete="current-password" autocapitalize="off" autocorrect="off" spellcheck="false">
      <button type="submit">ログイン</button>
    </form>
    <div class="auth-hint">背景画像は login-bg.JPG を同じ階層に配置してください</div>
  </div>
</div>

<div id="app">
  <button id="menuToggle" class="menu-toggle" onclick="toggleMenu()" aria-label="メニューを開く">
    <svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
  </button>
  <div id="menuOverlay" class="menu-overlay" onclick="closeMenu()"></div>
  <aside id="sideMenu" class="side-menu" aria-hidden="true">
    <div class="menu-header">
      <h3>温泉メニュー</h3>
      <button class="menu-close" onclick="closeMenu()" aria-label="閉じる">×</button>
    </div>
    <div class="menu-scroll">
      <section class="menu-block">
        <h4>サマリー</h4>
        <div class="stat-row">
          <div class="stat-chip"><strong id="statTotal">0</strong>総数</div>
          <div class="stat-chip"><strong id="statFiltered">0</strong>表示中</div>
          <div class="stat-chip"><strong id="statSelected">0</strong>選択中</div>
        </div>
        <div class="summary-sub">泉質 × 濃さの分布です。セルを押すと、その組み合わせだけに絞り込みます。</div>
        <div class="summary-legend"><span>薄め</span><span>普通</span><span>濃いめ</span></div>
        <div class="summary-matrix-wrap">
          <div id="summaryMatrix" class="summary-matrix"></div>
        </div>
      </section>

      <section class="menu-block">
        <h4>検索・並び替え</h4>
        <div class="menu-grid">
          <input id="searchBox" type="text" placeholder="温泉名・泉質・濃さ・都道府県・レビューで検索" oninput="renderOnsenList()">
          <select id="sortSelect" onchange="summaryFilter={type:'',density:''}; renderOnsenList()">
            <option value="default">並び替えなし</option>
            <option value="name">名前順</option>
            <option value="type">泉質順</option>
            <option value="priceAsc">価格が安い順</option>
            <option value="ratingDesc">評価が高い順</option>
            <option value="distanceAsc">現在地から近い順</option>
          </select>
        </div>
      </section>

      <section class="menu-block">
        <h4>絞り込み</h4>
        <div class="filter-grid">
          <select id="typeFilter" onchange="summaryFilter={type:'',density:''}; renderOnsenList()">
            <option value="">泉質をすべて表示</option>
          </select>
          <select id="prefectureFilter" onchange="summaryFilter={type:'',density:''}; renderOnsenList()">
            <option value="">都道府県をすべて表示</option>
          </select>
          <select id="densityFilter" onchange="summaryFilter={type:'',density:''}; renderOnsenList()">
            <option value="">濃さをすべて表示</option>
          </select>
          <select id="priceFilter" onchange="summaryFilter={type:'',density:''}; renderOnsenList()">
            <option value="">価格帯をすべて表示</option>
            <option value="cheap">1000円以下</option>
            <option value="mid">1001〜1500円</option>
            <option value="high">1501円以上</option>
            <option value="unknown">価格未設定</option>
          </select>
        </div>
        <div class="filter-tools">
          <button class="ghost-btn full-width" onclick="clearFilters()">絞り込み解除</button>
          <div id="filterSummary" class="filter-summary">0件 / 0件</div>
        </div>
        <div class="menu-note">選択ルートは端末内に保存されます。</div>
      </section>

      <section class="menu-block">
        <h4>温泉一覧</h4>
        <div id="onsenList" class="onsen-list"></div>
      </section>
    </div>
  </aside>

  <div id="map"></div>

  <div class="main">
    <div class="selected-panel">
      <div class="selected-title">選択ルート</div>
      <div id="selected"></div>
    </div>
  </div>

  <div id="detailOverlay" class="detail-overlay" onclick="closeDetail()"></div>
  <section id="detailSheet" class="detail-sheet" aria-hidden="true">
    <div id="detailHead" class="detail-head">
      <div class="detail-handle"></div>
      <div class="detail-title-row">
        <h3 id="detailTitle" class="detail-title">温泉詳細</h3>
        <button class="detail-close" onclick="closeDetail()" aria-label="詳細を閉じる">×</button>
      </div>
    </div>
    <div id="detailBody" class="detail-body"></div>
  </section>

  <div class="footer">
    <button onclick="drawRoute()" class="icon-btn route-btn" aria-label="ルート表示">
      <svg viewBox="0 0 24 24"><path d="M3 12h18M12 3l9 9-9 9"/></svg><span>ルート</span>
    </button>
    <button onclick="optimizeRoute()" class="icon-btn opt-btn" aria-label="最適化">
      <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h10M4 18h7"/></svg><span>最適化</span>
    </button>
    <button onclick="clearRoute()" class="icon-btn clear-btn" aria-label="リセット">
      <svg viewBox="0 0 24 24"><path d="M3 6h18M8 6v12M16 6v12"/></svg><span>リセット</span>
    </button>
    <button onclick="generateRoute()" class="icon-btn route-btn" aria-label="Google Mapでルート作成">
      <svg viewBox="0 0 24 24"><path d="M4 4h16v16H4zM8 12h8"/></svg><span>Google</span>
    </button>
    <button id="toggleStart" class="icon-btn toggle-btn" onclick="toggleStartMode()" aria-label="現在地から検索を切り替え">
      <svg viewBox="0 0 24 24"><path d="M12 2v20M2 12h20"/></svg><span>現在地</span>
    </button>
  </div>
</div>

<script>
const isMobile = window.matchMedia('(pointer: coarse)').matches;
if(isMobile) document.body.classList.add('mobile');

const PW_HASH = 'b25zZW4=';
const MAPTILER_KEY = '5803br5MI3qRfp9DVSHL';
const STORAGE_KEY = 'onsen-master-stage6';
const densityLevels = ['薄め','普通','濃いめ'];
let summaryFilter = { type:'', density:'' };

let map;
let onsens = [];
let selected = [];
let startFromCurrent = false;
let currentPopup = null;
let currentLocation = null;
let detailDrag = null;

const typeColor = {
  '銭湯': '#7f8c8d',
  '単純温泉': '#87ceeb',
  '塩化物泉': '#e74c3c',
  '炭酸水素塩泉': '#1abc9c',
  '硫酸塩泉': '#9b59b6',
  '二酸化炭素泉': '#3498db',
  '含鉄泉': '#d35400',
  '硫黄泉': '#f1c40f',
  '酸性泉': '#e84393',
  '放射能泉': '#27ae60',
  '含よう素泉': '#e67e22'
};

function showLoading(v){
  document.getElementById('loading').classList.toggle('active', v);
}

function fitRoute(coords){
  if(coords.length < 2) return;
  const bounds = new maplibregl.LngLatBounds(coords[0], coords[0]);
  coords.forEach(c => bounds.extend(c));
  map.fitBounds(bounds, {
    padding: { top: 60, bottom: isMobile ? 120 : 220, left: 40, right: 40 },
    duration: 600
  });
}

function resetViewportScale(){
  const meta = document.querySelector('meta[name="viewport"]');
  if(!meta) return;
  meta.setAttribute('content', 'width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1');
  requestAnimationFrame(() => {
    window.scrollTo(0, 0);
    document.body.style.zoom = '1';
  });
}

function login(){
  const pw = document.getElementById('pw');
  if(atob(PW_HASH) !== pw.value){
    alert('パスワードが違います');
    return;
  }
  pw.blur();
  resetViewportScale();

  const auth = document.getElementById('auth');
  const app = document.getElementById('app');
  auth.style.opacity = 0;
  auth.style.transform = 'scale(1.05)';

  setTimeout(() => {
    auth.style.display = 'none';
    app.style.opacity = 1;
    app.style.transform = 'translateY(0) scale(1)';
    resetViewportScale();
    init();
  }, 450);
}

async function init(){
  await loadCSV();
  setupFilterOptions();
  hydrateState();
  updateStats();

  map = new maplibregl.Map({
    container: 'map',
    style: `https://api.maptiler.com/maps/streets/style.json?key=${MAPTILER_KEY}`,
    center: [137, 36],
    zoom: 5
  });

  map.on('load', () => {
    map.resize();
    setupMap();
    renderSelected();
    renderOnsenList();

    map.addSource('route', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
    map.addLayer({
      id: 'route',
      type: 'line',
      source: 'route',
      paint: { 'line-color': '#007aff', 'line-width': 4 }
    });
  });

  setupDetailDrag();
}

async function loadCSV(){
  let txt = '';
  try{
    const res = await fetch('onsen.csv', { cache:'no-store' });
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    txt = await res.text();
  }catch(err){
    const embedded = document.getElementById('embeddedCSV');
    if(embedded) txt = embedded.textContent || '';
  }
  if(!txt.trim()) {
    alert('CSVを読み込めませんでした。onsen.csv を同じ階層に置くか、HTML内埋め込みデータを確認してください。');
    onsens = [];
    return;
  }
  onsens = parseCSV(txt).map((row, i) => ({
    id: i,
    name: (row.name || '').trim(),
    lat: Number(row.lat),
    lng: Number(row.lng),
    type: (row.type || '').trim(),
    density: normalizeDensity((row.density || '').trim()),
    prefecture: (row.prefecture || '').trim(),
    price: (row.price || '').trim(),
    rating: (row.rating || '').trim(),
    review: (row.review || '').trim(),
    description: (row.description || '').trim(),
    address: (row.address || '').trim(),
    hours: (row.hours || '').trim(),
    url: (row.url || '').trim()
  })).filter(o => Number.isFinite(o.lat) && Number.isFinite(o.lng) && o.name);
}

function parseCSV(text){
  const rows = [];
  let row = [];
  let value = '';
  let inQuotes = false;
  for(let i = 0; i < text.length; i++){
    const ch = text[i];
    const next = text[i + 1];
    if(ch === '"'){
      if(inQuotes && next === '"'){
        value += '"';
        i++;
      }else{
        inQuotes = !inQuotes;
      }
    }else if(ch === ',' && !inQuotes){
      row.push(value); value = '';
    }else if((ch === '\n' || ch === '\r') && !inQuotes){
      if(ch === '\r' && next === '\n') i++;
      row.push(value); value = '';
      if(row.some(cell => cell !== '')) rows.push(row);
      row = [];
    }else{
      value += ch;
    }
  }
  if(value !== '' || row.length){
    row.push(value);
    if(row.some(cell => cell !== '')) rows.push(row);
  }
  if(!rows.length) return [];
  const headers = rows[0].map(h => h.trim());
  return rows.slice(1).map(cols => {
    const obj = {};
    headers.forEach((header, idx) => obj[header] = (cols[idx] || '').trim());
    return obj;
  });
}

function setupFilterOptions(){
  const typeSelect = document.getElementById('typeFilter');
  const prefectureSelect = document.getElementById('prefectureFilter');
  const densitySelect = document.getElementById('densityFilter');

  const types = [...new Set(onsens.map(o => o.type).filter(Boolean))].sort((a,b) => a.localeCompare(b, 'ja'));
  const prefectures = [...new Set(onsens.map(o => o.prefecture).filter(Boolean))].sort((a,b) => a.localeCompare(b, 'ja'));

  typeSelect.innerHTML = '<option value="">泉質をすべて表示</option>' + types.map(t => `<option value="${escapeAttr(t)}">${escapeHTML(t)}</option>`).join('');
  prefectureSelect.innerHTML = '<option value="">都道府県をすべて表示</option>' + prefectures.map(v => `<option value="${escapeAttr(v)}">${escapeHTML(v)}</option>`).join('');
  densitySelect.innerHTML = '<option value="">濃さをすべて表示</option>' + densityLevels.map(v => `<option value="${escapeAttr(v)}">${escapeHTML(v)}</option>`).join('');
}

function setupMap(){
  map.addSource('onsen', {
    type: 'geojson',
    data: geo(),
    cluster: true,
    clusterMaxZoom: 10,
    clusterRadius: 40
  });

  map.addLayer({ id:'cluster', type:'circle', source:'onsen', filter:['has','point_count'], paint:{'circle-color':'#636e72','circle-radius':18} });
  map.addLayer({ id:'cluster-count', type:'symbol', source:'onsen', filter:['has','point_count'], layout:{'text-field':['get','point_count']}, paint:{'text-color':'#fff'} });
  map.addLayer({ id:'points', type:'circle', source:'onsen', filter:['!has','point_count'], paint:{'circle-color':['get','color'],'circle-radius':8} });
  map.addLayer({ id:'selected', type:'circle', source:'onsen', filter:['in','id',-1], paint:{'circle-color':['get','color'],'circle-radius':14,'circle-stroke-width':3,'circle-stroke-color':'#f1c40f'} });
  map.addLayer({ id:'order', type:'symbol', source:'onsen', filter:['in','id',-1], layout:{'text-field':['get','order'],'text-size':14}, paint:{'text-color':'#fff'} });
  map.addLayer({
    id:'label', type:'symbol', source:'onsen', filter:['!has','point_count'],
    layout:{'text-field':['get','name'],'text-size':14,'text-offset':[0,1.2]},
    paint:{'text-color':'#000','text-halo-color':'#fff','text-halo-width':2}
  });

  map.moveLayer('selected');
  map.moveLayer('order');

  map.on('click', e => {
    const features = map.queryRenderedFeatures([[e.point.x - 10, e.point.y - 10],[e.point.x + 10, e.point.y + 10]], { layers:['points'] });
    if(features.length){
      const id = Number(features[0].properties.id);
      openPointActionPopup(id, features[0].geometry.coordinates);
    }else{
      closePointPopup();
    }
  });

  map.on('click', 'cluster', e => {
    const f = map.queryRenderedFeatures(e.point, { layers:['cluster'] })[0];
    map.getSource('onsen').getClusterExpansionZoom(f.properties.cluster_id, (err, zoom) => {
      if(err) return;
      map.easeTo({ center:f.geometry.coordinates, zoom });
    });
  });

  map.on('movestart', closePointPopup);
}

function geo(){
  return {
    type: 'FeatureCollection',
    features: onsens.map(o => ({
      type: 'Feature',
      geometry: { type: 'Point', coordinates: [o.lng, o.lat] },
      properties: {
        id: o.id,
        name: o.name,
        color: typeColor[o.type] || '#7f8c8d',
        order: selected.includes(o.id) ? String(selected.indexOf(o.id) + 1) : ''
      }
    }))
  };
}

function update(){
  if(map?.getSource('onsen')){
    map.getSource('onsen').setData(geo());
    map.setFilter('selected', ['in','id',...selected]);
    map.setFilter('order', ['in','id',...selected]);
  }
  persistState();
  updateStats();
  renderSelected();
  renderOnsenList();
}

function persistState(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ selected, startFromCurrent }));
  }catch(err){}
}

function hydrateState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return;
    const saved = JSON.parse(raw);
    if(Array.isArray(saved.selected)) selected = saved.selected.filter(id => onsens.some(o => o.id === id));
    startFromCurrent = !!saved.startFromCurrent;
    document.getElementById('toggleStart').classList.toggle('active', startFromCurrent);
  }catch(err){}
}

function updateStats(){
  document.getElementById('statTotal').textContent = String(onsens.length);
  document.getElementById('statSelected').textContent = String(selected.length);
  const filtered = getFilteredOnsens();
  document.getElementById('statFiltered').textContent = String(filtered.length);
  renderSummaryMatrix(filtered);
}

async function drawRoute(){
  if(selected.length < 2) return;
  showLoading(true);
  const coordPairs = selected.map(i => [onsens[i].lng, onsens[i].lat]);
  fitRoute(coordPairs);
  const coords = coordPairs.map(c => c.join(','));
  const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${coords.join(';')}?overview=full&geometries=geojson`);
  const data = await res.json();
  map.getSource('route').setData({ type:'Feature', geometry:data.routes[0].geometry });
  showLoading(false);
}

async function optimizeRoute(){
  if(selected.length < 2) return;
  showLoading(true);
  selected.sort((a,b) => onsens[a].lat - onsens[b].lat);
  update();
  await drawRoute();
}

function renderSelected(){
  if(isMobile) return;
  const el = document.getElementById('selected');
  if(!selected.length){
    el.innerHTML = '<div class="empty-note">地図またはメニュー一覧から温泉を選択してください。</div>';
    return;
  }
  el.innerHTML = selected.map(i => {
    const o = onsens[i];
    return `
      <div class="selected-item" onclick="showDetail(${i})" role="button" tabindex="0">
        <div class="selected-item-info">
          <div class="selected-item-title">${escapeHTML(o.name)}</div>
          <div class="selected-item-meta">${escapeHTML(o.prefecture || '都道府県未設定')} / ${escapeHTML(o.type || '泉質未設定')}</div>
        </div>
        <button class="remove-btn" onclick="event.stopPropagation(); removeItem(${i})" aria-label="${escapeAttr(o.name)} を削除">×</button>
      </div>`;
  }).join('');
}

function getFilteredOnsens(){
  const keyword = (document.getElementById('searchBox')?.value || '').trim().toLowerCase();
  const typeFilter = document.getElementById('typeFilter')?.value || '';
  const prefectureFilter = document.getElementById('prefectureFilter')?.value || '';
  const densityFilter = document.getElementById('densityFilter')?.value || '';
  const priceFilter = document.getElementById('priceFilter')?.value || '';
  const sort = document.getElementById('sortSelect')?.value || 'default';

  let list = [...onsens];
  if(keyword){
    list = list.filter(o => [o.name, o.type, o.density, o.prefecture, o.review, o.description, o.address].filter(Boolean).some(v => v.toLowerCase().includes(keyword)));
  }
  if(typeFilter) list = list.filter(o => o.type === typeFilter);
  if(prefectureFilter) list = list.filter(o => o.prefecture === prefectureFilter);
  if(densityFilter) list = list.filter(o => o.density === densityFilter);
  if(priceFilter) list = list.filter(o => matchPriceFilter(o.price, priceFilter));
  if(summaryFilter.type) list = list.filter(o => o.type === summaryFilter.type);
  if(summaryFilter.density) list = list.filter(o => o.density === summaryFilter.density);

  if(sort === 'name') list.sort((a,b) => a.name.localeCompare(b.name, 'ja'));
  else if(sort === 'type') list.sort((a,b) => (a.type || '').localeCompare(b.type || '', 'ja'));
  else if(sort === 'priceAsc') list.sort((a,b) => normalizePrice(a.price) - normalizePrice(b.price));
  else if(sort === 'ratingDesc') list.sort((a,b) => normalizeRating(b.rating) - normalizeRating(a.rating));
  else if(sort === 'distanceAsc') list.sort((a,b) => getDistanceValue(a) - getDistanceValue(b));

  return list;
}

function renderOnsenList(){
  const el = document.getElementById('onsenList');
  if(!el) return;
  const list = getFilteredOnsens();
  updateFilterSummary(list.length);
  renderSummaryMatrix(list);
  if(!list.length){
    el.innerHTML = '<div class="no-result">該当する温泉がありません。</div>';
    return;
  }
  el.innerHTML = list.map(o => {
    const selectedClass = selected.includes(o.id) ? 'solid-btn is-selected' : 'solid-btn';
    const selectedLabel = selected.includes(o.id) ? '選択解除' : '選択';
    return `
      <article class="onsen-item">
        <div class="onsen-head">
          <div>
            <div class="onsen-name">${escapeHTML(o.name)}</div>
            <div class="onsen-type">
              <span class="onsen-type-dot" style="background:${typeColor[o.type] || '#7f8c8d'}"></span>
              <span>${escapeHTML(o.type || '泉質未設定')}</span>
            </div>
          </div>
        </div>

        <div class="onsen-mini">
          <div>都道府県: ${escapeHTML(o.prefecture || '未設定')}</div>
          <div>濃さ: ${escapeHTML(o.density || '普通')}</div>
          <div>価格: ${escapeHTML(formatPrice(o.price))}</div>
          <div>評価: ${escapeHTML(formatRating(o.rating))}</div>
          <div title="${escapeAttr(o.review || 'レビュー未設定')}">レビュー: ${escapeHTML(o.review || '未設定')}</div>
          <div title="${escapeAttr(o.hours || '営業時間未設定')}">${currentLocation ? '距離: ' + escapeHTML(formatDistance(getDistanceValue(o))) : '営業時間: ' + escapeHTML(o.hours || '未設定')}</div>
        </div>

        <div class="onsen-actions">
          <button class="ghost-btn" onclick="focusOnsen(${o.id});">地図へ</button>
          <button class="ghost-btn" onclick="showDetail(${o.id})">詳細</button>
          <button class="${selectedClass}" onclick="toggle(${o.id})">${selectedLabel}</button>
        </div>
      </article>`;
  }).join('');
}

function openPointActionPopup(id, coords){
  const o = onsens.find(x => x.id === id);
  if(!o || !map) return;
  closePointPopup();
  const selectedLabel = selected.includes(id) ? '選択解除' : '選択';
  const html = `
    <div class="popup-card">
      <div>
        <div class="popup-title">${escapeHTML(o.name)}</div>
        <div class="popup-meta">${escapeHTML(o.prefecture || '都道府県未設定')} / ${escapeHTML(o.type || '泉質未設定')}</div>
      </div>
      <div class="popup-actions">
        <button class="popup-pick" data-popup-action="toggle" data-id="${id}">${selectedLabel}</button>
        <button class="popup-detail" data-popup-action="detail" data-id="${id}">詳細</button>
      </div>
    </div>`;
  currentPopup = new maplibregl.Popup({ closeButton:false, offset:18 })
    .setLngLat(coords)
    .setHTML(html)
    .addTo(map);
}

function closePointPopup(){
  if(currentPopup){ currentPopup.remove(); currentPopup = null; }
}

function focusOnsen(id, closeMenuAfter=true){
  const o = onsens.find(x => x.id === id);
  if(!o || !map) return;
  closePointPopup();
  map.easeTo({ center:[o.lng, o.lat], zoom:11, duration:700 });
  if(closeMenuAfter) closeMenu();
}

function removeItem(i){
  selected = selected.filter(x => x !== i);
  update();
}

function toggle(i){
  if(selected.includes(i)) selected = selected.filter(x => x !== i);
  else selected.push(i);
  closePointPopup();
  update();
}



function clearRoute(){
  if(map?.getSource('route')) map.getSource('route').setData({ type:'FeatureCollection', features:[] });
}

function toggleStartMode(){
  startFromCurrent = !startFromCurrent;
  document.getElementById('toggleStart').classList.toggle('active', startFromCurrent);
  if(startFromCurrent) requestCurrentLocation();
  persistState();
  renderOnsenList();
}

function requestCurrentLocation(){
  if(!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(pos => {
    currentLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    renderOnsenList();
  }, () => {}, { enableHighAccuracy:true, timeout:8000, maximumAge:300000 });
}

function generateRoute(){
  if(!selected.length) return;
  const names = selected.map(i => encodeURIComponent(onsens[i].name));
  const url = startFromCurrent
    ? `https://www.google.com/maps/dir/?api=1&origin=Current+Location&destination=${names.at(-1)}&waypoints=${names.slice(0,-1).join('|')}`
    : `https://www.google.com/maps/dir/?api=1&origin=${names[0]}&destination=${names.at(-1)}&waypoints=${names.slice(1,-1).join('|')}`;
  window.open(url);
}

function toggleMenu(){
  const menu = document.getElementById('sideMenu');
  const overlay = document.getElementById('menuOverlay');
  const opened = menu.classList.toggle('open');
  overlay.classList.toggle('show', opened);
  menu.setAttribute('aria-hidden', String(!opened));
}

function closeMenu(){
  document.getElementById('sideMenu').classList.remove('open');
  document.getElementById('menuOverlay').classList.remove('show');
  document.getElementById('sideMenu').setAttribute('aria-hidden', 'true');
}

function showDetail(id){
  const o = onsens.find(x => x.id === id);
  if(!o) return;
  closePointPopup();

  const body = document.getElementById('detailBody');
  const title = document.getElementById('detailTitle');
  const selectedNow = selected.includes(id);
  title.textContent = o.name;
  body.innerHTML = `
    <div class="detail-badges">
      <span class="detail-badge"><span class="onsen-type-dot" style="background:${typeColor[o.type] || '#7f8c8d'}"></span><span>${escapeHTML(o.type || '泉質未設定')}</span></span>
      <span class="detail-badge">都道府県: ${escapeHTML(o.prefecture || '未設定')}</span>
      <span class="detail-badge">濃さ: ${escapeHTML(o.density || '普通')}</span>
      <span class="detail-badge">価格: ${escapeHTML(formatPrice(o.price))}</span>
      <span class="detail-badge">評価: ${escapeHTML(formatRating(o.rating))}</span>
      <span class="detail-badge">${selectedNow ? '選択中' : '未選択'}</span>
    </div>

    <section class="detail-section">
      <h4>概要</h4>
      <div class="detail-value">${escapeHTML(o.description || o.review || '詳細説明は未設定です。')}</div>
    </section>

    <section class="detail-section">
      <h4>基本情報</h4>
      <div class="detail-grid">
        <div class="detail-field"><span class="detail-label">都道府県</span><div class="detail-value">${escapeHTML(o.prefecture || '未設定')}</div></div>
        <div class="detail-field"><span class="detail-label">濃さ</span><div class="detail-value">${escapeHTML(o.density || '普通')}</div></div>
        <div class="detail-field"><span class="detail-label">レビュー</span><div class="detail-value">${escapeHTML(o.review || '未設定')}</div></div>
        <div class="detail-field"><span class="detail-label">営業時間</span><div class="detail-value">${escapeHTML(o.hours || '未設定')}</div></div>
        <div class="detail-field"><span class="detail-label">住所</span><div class="detail-value">${escapeHTML(o.address || '未設定')}</div></div>
        <div class="detail-field"><span class="detail-label">座標</span><div class="detail-value">${o.lat.toFixed(6)}, ${o.lng.toFixed(6)}</div></div>
      </div>

      <div class="detail-actions">
        <button class="ghost-btn" onclick="focusOnsen(${id}, false)">地図へ移動</button>
        <button class="${selectedNow ? 'solid-btn is-selected' : 'solid-btn'}" onclick="toggle(${id}); showDetail(${id});">${selectedNow ? '選択解除' : 'ルートに追加'}</button>
      </div>
      ${o.url ? `<div class="detail-actions"><a class="detail-link" href="${escapeAttr(o.url)}" target="_blank" rel="noopener noreferrer">公式サイトを開く</a></div>` : ''}
    </section>`;

  document.documentElement.style.setProperty('--sheet-translate', '0px');
  document.getElementById('detailSheet').classList.add('open');
  document.getElementById('detailOverlay').classList.add('show');
  document.getElementById('detailSheet').setAttribute('aria-hidden', 'false');
}

function closeDetail(){
  document.documentElement.style.setProperty('--sheet-translate', 'calc(100% + 24px)');
  document.getElementById('detailSheet').classList.remove('open');
  document.getElementById('detailOverlay').classList.remove('show');
  document.getElementById('detailSheet').setAttribute('aria-hidden', 'true');
}

function setupDetailDrag(){
  const sheet = document.getElementById('detailSheet');
  const head = document.getElementById('detailHead');
  const body = document.getElementById('detailBody');

  const start = (clientY) => {
    if(sheet.getAttribute('aria-hidden') === 'true') return;
    detailDrag = { startY: clientY, deltaY: 0, dragging: true };
    head.classList.add('dragging');
    sheet.style.transition = 'none';
  };
  const move = (clientY) => {
    if(!detailDrag?.dragging) return;
    const delta = Math.max(0, clientY - detailDrag.startY);
    detailDrag.deltaY = delta;
    document.documentElement.style.setProperty('--sheet-translate', `${delta}px`);
  };
  const end = () => {
    if(!detailDrag?.dragging) return;
    const shouldClose = detailDrag.deltaY > Math.min(window.innerHeight * 0.18, 140);
    detailDrag.dragging = false;
    head.classList.remove('dragging');
    sheet.style.transition = '';
    if(shouldClose) closeDetail();
    else document.documentElement.style.setProperty('--sheet-translate', '0px');
    detailDrag = null;
  };

  head.addEventListener('touchstart', e => start(e.touches[0].clientY), { passive:true });
  head.addEventListener('touchmove', e => move(e.touches[0].clientY), { passive:true });
  head.addEventListener('touchend', end);
  head.addEventListener('mousedown', e => { start(e.clientY); e.preventDefault(); });
  window.addEventListener('mousemove', e => move(e.clientY));
  window.addEventListener('mouseup', end);

  body.addEventListener('touchstart', e => {
    if(body.scrollTop <= 0) start(e.touches[0].clientY);
  }, { passive:true });
  body.addEventListener('touchmove', e => {
    if(detailDrag?.dragging) move(e.touches[0].clientY);
  }, { passive:true });
  body.addEventListener('touchend', end);
}


function normalizeDensity(value){
  const v = String(value || '').trim();
  if(!v) return '普通';
  if(['薄め','薄い','弱め'].includes(v)) return '薄め';
  if(['濃いめ','濃い','強め'].includes(v)) return '濃いめ';
  return '普通';
}
function setSummaryFilter(type, density){
  if(summaryFilter.type === type && summaryFilter.density === density) summaryFilter = { type:'', density:'' };
  else summaryFilter = { type, density };
  renderOnsenList();
}
function renderSummaryMatrix(list){
  const el = document.getElementById('summaryMatrix');
  if(!el) return;
  const types = [...new Set(onsens.map(o => o.type).filter(Boolean))].sort((a,b) => a.localeCompare(b,'ja'));
  const counts = new Map();
  onsens.forEach(o => {
    const key = `${o.type}__${o.density}`;
    counts.set(key, (counts.get(key) || 0) + 1);
  });
  const parts = [];
  parts.push('<div class="summary-corner">泉質</div>');
  densityLevels.forEach(d => parts.push(`<div class="summary-col-head">${escapeHTML(d)}</div>`));
  types.forEach(type => {
    parts.push(`<div class="summary-row-head"><span class="summary-row-dot" style="background:${typeColor[type] || '#7f8c8d'}"></span><span>${escapeHTML(type)}</span></div>`);
    densityLevels.forEach(density => {
      const key = `${type}__${density}`;
      const n = counts.get(key) || 0;
      const active = summaryFilter.type === type && summaryFilter.density === density ? ' active' : '';
      parts.push(`<button type="button" class="summary-cell${active}" style="background:${getDensityColor(type, density)}" data-summary-type="${escapeAttr(type)}" data-summary-density="${escapeAttr(density)}" title="${escapeAttr(type)} / ${escapeAttr(density)}: ${n}件" aria-label="${escapeAttr(type)} ${escapeAttr(density)} ${n}件で絞り込み"><span>${n}</span><span class="summary-cell-label">${escapeHTML(density)}</span></button>`);
    });
  });
  el.innerHTML = parts.join('');
}
function getDensityColor(type, density){
  const base = typeColor[type] || '#7f8c8d';
  if(density === '薄め') return mixHex(base, '#ffffff', 0.80);
  if(density === '普通') return mixHex(base, '#ffffff', 0.56);
  return mixHex(mixHex(base, '#ffffff', 0.18), '#0f172a', 0.06);
}
function mixHex(a, b, w){
  const pa = parseInt(a.slice(1), 16), pb = parseInt(b.slice(1), 16);
  const ar = (pa >> 16) & 255, ag = (pa >> 8) & 255, ab = pa & 255;
  const br = (pb >> 16) & 255, bg = (pb >> 8) & 255, bb = pb & 255;
  const rr = Math.round(ar * (1 - w) + br * w);
  const rg = Math.round(ag * (1 - w) + bg * w);
  const rb = Math.round(ab * (1 - w) + bb * w);
  return `#${[rr, rg, rb].map(v => v.toString(16).padStart(2,'0')).join('')}`;
}

function formatPrice(value){
  const n = Number(String(value).replace(/[^\d.]/g, ''));
  if(!Number.isFinite(n) || !value) return '未設定';
  return `${n.toLocaleString('ja-JP')}円`;
}
function formatRating(value){
  const n = Number(value);
  if(!Number.isFinite(n)) return '未設定';
  return n.toFixed(1);
}
function normalizePrice(value){
  const n = Number(String(value).replace(/[^\d.]/g, ''));
  return Number.isFinite(n) ? n : Number.POSITIVE_INFINITY;
}
function normalizeRating(value){
  const n = Number(value);
  return Number.isFinite(n) ? n : Number.NEGATIVE_INFINITY;
}
function toBool(v){
  return ['1','true','yes','y'].includes(String(v || '').trim().toLowerCase());
}
function clearFilters(){
  const ids = ['searchBox','typeFilter','prefectureFilter','densityFilter','priceFilter','sortSelect'];
  ids.forEach(id => {
    const el = document.getElementById(id);
    if(el) el.value = (id === 'sortSelect') ? 'default' : '';
  });
  summaryFilter = { type:'', density:'' };
  renderOnsenList();
}
function updateFilterSummary(filteredCount){
  const el = document.getElementById('filterSummary');
  if(!el) return;
  const parts = [];
  const type = document.getElementById('typeFilter')?.value;
  const prefecture = document.getElementById('prefectureFilter')?.value;
  const density = document.getElementById('densityFilter')?.value;
  const price = document.getElementById('priceFilter')?.value;
  if(type) parts.push(`泉質: ${type}`);
  if(prefecture) parts.push(`都道府県: ${prefecture}`);
  if(density) parts.push(`濃さ: ${density}`);
  if(price){
    const map = {cheap:'1000円以下', mid:'1001〜1500円', high:'1501円以上', unknown:'価格未設定'};
    parts.push(`価格: ${map[price] || price}`);
  }
  if(summaryFilter.type || summaryFilter.density){
    parts.push(`サマリー: ${summaryFilter.type || 'すべて'} × ${summaryFilter.density || 'すべて'}`);
  }
  el.textContent = `${filteredCount}件 / ${onsens.length}件` + (parts.length ? `  |  ${parts.join(' / ')}` : '');
  document.getElementById('statFiltered').textContent = String(filteredCount);
}
function matchPriceFilter(value, filter){
  const n = Number(String(value).replace(/[^\d.]/g, ''));
  if(!Number.isFinite(n)) return filter === 'unknown';
  if(filter === 'cheap') return n <= 1000;
  if(filter === 'mid') return n >= 1001 && n <= 1500;
  if(filter === 'high') return n >= 1501;
  return true;
}
function getDistanceValue(o){
  if(!currentLocation) return Number.POSITIVE_INFINITY;
  return haversine(currentLocation.lat, currentLocation.lng, o.lat, o.lng);
}
function formatDistance(km){
  if(!Number.isFinite(km)) return '未取得';
  return km < 10 ? `${km.toFixed(1)}km` : `${Math.round(km)}km`;
}
function haversine(lat1, lon1, lat2, lon2){
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}
function escapeHTML(value){
  return String(value ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function escapeAttr(value){
  return escapeHTML(value).replace(/`/g, '&#96;');
}
