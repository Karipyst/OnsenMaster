<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>温泉マップ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#f2f2f7;
}

/* ===== ローディング ===== */
#loading{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.25);
  display:flex;justify-content:center;align-items:center;
  z-index:20;opacity:0;pointer-events:none;transition:.3s;
}
#loading.active{opacity:1;pointer-events:auto;}
.spinner{
  width:40px;height:40px;
  border:4px solid #fff;border-top:4px solid transparent;
  border-radius:50%;animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* ===== 認証 ===== */
#auth{
  position:fixed;inset:0;
  display:flex;justify-content:center;align-items:center;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  z-index:10;transition:.6s;
}
.auth-card{
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.1);
  padding:30px;border-radius:20px;width:260px;text-align:center;
}
.auth-title{color:#fff;margin-bottom:12px;}

.auth-card input,.auth-card button{
  width:100%;padding:12px;border:none;border-radius:10px;margin-bottom:10px;
}
.auth-card button{background:#34c759;color:#fff;}

/* ===== 本体 ===== */
#app{
  position:fixed;inset:0;
  opacity:0;transform:translateY(20px);
  transition:.6s;
}

#map{
  position:fixed;top:0;width:100%;height:65vh;
}

/* PCリスト */
.main{
  margin-top:65vh;padding:12px;
}
#selected{
  max-height:220px;overflow-y:auto;
}

.selected-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px;margin:6px 0;background:#fff;border-radius:10px;
  transition:.25s;
}
.selected-item.removing{transform:translateX(40px);opacity:0;}

.remove-btn{
  width:26px;height:26px;border-radius:50%;
  background:#e5e5ea;display:flex;align-items:center;justify-content:center;
  border:none;
}

/* フッター */
.footer{
  position:fixed;
  bottom:env(safe-area-inset-bottom);
  width:100%;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(20px);
  padding:10px;
  display:flex;justify-content:center;gap:8px;flex-wrap:wrap;
}

button{padding:10px 14px;border:none;border-radius:12px;}
.route-btn{background:#007aff;color:#fff;}
.clear-btn{background:#ff3b30;color:#fff;}
.opt-btn{background:#34c759;color:#fff;}
.toggle-btn{background:#d1d1d6;}
.toggle-btn.active{background:#34c759;color:#fff;}

.mobile #map{height:100vh;}
.mobile .main{display:none;}
</style>
</head>

<body>

<div id="loading"><div class="spinner"></div></div>

<div id="auth">
  <div class="auth-card">
    <div class="auth-title">温泉マップ</div>
    <input type="password" id="pw">
    <button onclick="login()">ログイン</button>
  </div>
</div>

<div id="app">
  <div id="map"></div>

  <div class="main">
    <div id="selected"></div>
  </div>

  <div class="footer">
    <button onclick="generateRoute()" class="route-btn">GoogleMap</button>
    <button onclick="drawRoute()" class="route-btn">地図表示</button>
    <button onclick="optimizeRoute()" class="opt-btn">最適化</button>
    <button onclick="clearRoute()" class="clear-btn">削除</button>
    <button id="toggleStart" class="toggle-btn" onclick="toggleStartMode()">現在地</button>
  </div>
</div>

<script>

const isMobile = window.matchMedia("(pointer: coarse)").matches;
if(isMobile) document.body.classList.add("mobile");

const PW_HASH="b25zZW4=";
const decode=s=>atob(s);

const MAPTILER_KEY="5803br5MI3qRfp9DVSHL";

let onsens=[],selected=[],map;
let startFromCurrent=false;

/* ===== 共通：画面フィット ===== */
function fitToCoordinates(coords){
  if(coords.length<2) return;

  let minX=999,maxX=-999,minY=999,maxY=-999;
  coords.forEach(([x,y])=>{
    if(x<minX) minX=x;
    if(x>maxX) maxX=x;
    if(y<minY) minY=y;
    if(y>maxY) maxY=y;
  });

  map.fitBounds([[minX,minY],[maxX,maxY]],{
    padding:{
      top:40,
      bottom:isMobile?120:200,
      left:40,
      right:40
    },
    duration:600
  });
}

/* ログイン */
function login(){
  if(document.getElementById("pw").value!==decode(PW_HASH)){
    alert("違います"); return;
  }

  document.getElementById("auth").style.opacity=0;
  setTimeout(()=>{
    document.getElementById("auth").style.display="none";
    document.getElementById("app").style.opacity=1;
    document.getElementById("app").style.transform="translateY(0)";
    init();
  },400);
}

/* 初期化 */
async function init(){
  await loadCSV();

  map=new maplibregl.Map({
    container:'map',
    style:`https://api.maptiler.com/maps/streets/style.json?key=${MAPTILER_KEY}`,
    center:[135.15,34.75],
    zoom:6
  });

  map.on('load',()=>{
    map.resize(); // ★重要
    setupMap();
    renderSelected();

    map.addSource('route',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
    map.addLayer({
      id:'route-line',
      type:'line',
      source:'route',
      paint:{'line-color':'#007aff','line-width':4}
    });
  });
}

/* CSV */
async function loadCSV(){
  const res=await fetch("onsen.csv");
  const text=await res.text();
  const lines=text.trim().split(/\r?\n/);

  onsens=lines.slice(1).map((l,i)=>{
    const c=l.split(",");
    return {id:i,name:c[0],lat:+c[1],lng:+c[2],type:c[3]};
  });
}

/* ===== 地図 ===== */
function setupMap(){
  map.addSource('onsen',{type:'geojson',data:geo(),cluster:true});

  map.addLayer({
    id:'cluster',
    type:'circle',
    source:'onsen',
    filter:['has','point_count'],
    paint:{'circle-color':'#636e72','circle-radius':18}
  });

  map.addLayer({
    id:'cluster-count',
    type:'symbol',
    source:'onsen',
    filter:['has','point_count'],
    layout:{'text-field':['get','point_count']},
    paint:{'text-color':'#fff'}
  });

  map.addLayer({
    id:'points',
    type:'circle',
    source:'onsen',
    filter:['!has','point_count'],
    paint:{
      'circle-color':['get','color'],
      'circle-radius':8,
      'circle-stroke-width':1,
      'circle-stroke-color':'#fff'
    }
  });

  map.addLayer({
    id:'label',
    type:'symbol',
    source:'onsen',
    filter:['!has','point_count'],
    layout:{
      'text-field':['get','name'],
      'text-size':10,
      'text-offset':[0,1.2]
    }
  });

  map.on('click','points',e=>{
    toggle(e.features[0].properties.id);
  });

  map.on('click','cluster',e=>{
    const f=map.queryRenderedFeatures(e.point,{layers:['cluster']})[0];
    map.getSource('onsen').getClusterExpansionZoom(f.properties.cluster_id,(err,zoom)=>{
      map.easeTo({center:f.geometry.coordinates,zoom});
    });
  });
}

function geo(){
  return{
    type:'FeatureCollection',
    features:onsens.map(o=>({
      type:'Feature',
      geometry:{type:'Point',coordinates:[o.lng,o.lat]},
      properties:o
    }))
  };
}

/* ===== ルート ===== */
async function drawRoute(){
  if(selected.length<2) return;

  const coords=selected.map(i=>{
    const o=onsens[i];
    return `${o.lng},${o.lat}`;
  });

  fitToCoordinates(coords.map(c=>c.split(',').map(Number)));

  const res=await fetch(`https://router.project-osrm.org/route/v1/driving/${coords.join(';')}?overview=full&geometries=geojson`);
  const data=await res.json();

  const line=data.routes[0].geometry.coordinates;

  let i=0,partial=[];
  function step(){
    for(let j=0;j<30 && i<line.length;j++,i++){
      partial.push(line[i]);
    }
    map.getSource('route').setData({
      type:'Feature',
      geometry:{type:'LineString',coordinates:partial}
    });
    if(i<line.length) requestAnimationFrame(step);
  }
  step();
}

/* 最適化 */
async function optimizeRoute(){
  selected.sort((a,b)=>onsens[a].lat-onsens[b].lat);
  renderSelected();
  await drawRoute();
}

/* UI */
function renderSelected(){
  if(isMobile) return;

  const el=document.getElementById("selected");
  el.innerHTML="";

  selected.forEach(i=>{
    const d=document.createElement("div");
    d.className="selected-item";
    d.innerHTML=`
      <span>${onsens[i].name}</span>
      <button class="remove-btn" onclick="removeItem(this,${i})">×</button>
    `;
    el.appendChild(d);
  });
}

function removeItem(btn,i){
  const item=btn.closest(".selected-item");
  item.classList.add("removing");
  setTimeout(()=>{
    selected=selected.filter(x=>x!==i);
    renderSelected();
  },200);
}

function toggle(i){
  selected.includes(i)
    ? selected=selected.filter(x=>x!==i)
    : selected.push(i);
  renderSelected();
}

function clearRoute(){
  map.getSource('route').setData({type:'FeatureCollection',features:[]});
}

function toggleStartMode(){
  startFromCurrent=!startFromCurrent;
  document.getElementById("toggleStart").classList.toggle("active",startFromCurrent);
}

function generateRoute(){}

</script>
</body>
</html>
