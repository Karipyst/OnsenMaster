<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>温泉マップ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#f2f2f7;
}

/* ===== ローディング ===== */
#loading{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.25);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:20;
  opacity:0;
  pointer-events:none;
  transition:.3s;
}
#loading.active{
  opacity:1;
  pointer-events:auto;
}
.spinner{
  width:40px;
  height:40px;
  border:4px solid #fff;
  border-top:4px solid transparent;
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{
  to{ transform:rotate(360deg); }
}

/* ===== 認証 ===== */
#auth{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  z-index:10;
  transition:.6s;
}
.auth-card{
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.1);
  padding:30px;
  border-radius:20px;
  width:260px;
  text-align:center;
}
.auth-title{color:#fff;margin-bottom:12px;}

.auth-card input,
.auth-card button{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-bottom:10px;
}
.auth-card button{background:#34c759;color:#fff;}

/* ===== 本体 ===== */
#app{
  position:fixed;
  inset:0;
  opacity:0;
  transform:translateY(20px);
  transition:.6s;
}

#map{
  position:fixed;
  top:0;
  width:100%;
  height:65vh;
}

.main{
  margin-top:65vh;
  padding:12px;
}

#selected{
  max-height:220px;
  overflow-y:auto;
}

/* ★ 削除アニメ */
.selected-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  margin:6px 0;
  background:#fff;
  border-radius:10px;
  transition:.25s;
}
.selected-item.removing{
  transform:translateX(50px);
  opacity:0;
}

.remove-btn{
  width:26px;
  height:26px;
  border-radius:50%;
  background:#e5e5ea;
  display:flex;
  align-items:center;
  justify-content:center;
  border:none;
}

/* フッター */
.footer{
  position:fixed;
  bottom:env(safe-area-inset-bottom);
  width:100%;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(20px);
  padding:10px;
  display:flex;
  justify-content:center;
  gap:8px;
}
button{
  padding:10px 14px;
  border:none;
  border-radius:12px;
}

.route-btn{background:#007aff;color:#fff;}
.clear-btn{background:#ff3b30;color:#fff;}
.opt-btn{background:#34c759;color:#fff;}

.toggle-btn{background:#d1d1d6;}
.toggle-btn.active{background:#34c759;color:#fff;}

.mobile #map{height:100vh;}
.mobile .main{display:none;}
</style>
</head>

<body>

<div id="loading"><div class="spinner"></div></div>

<div id="auth">
  <div class="auth-card">
    <div class="auth-title">温泉マップ</div>
    <input type="password" id="pw">
    <button onclick="login()">ログイン</button>
  </div>
</div>

<div id="app">
  <div id="map"></div>

  <div class="main">
    <div id="selected"></div>
  </div>

  <div class="footer">
    <button onclick="generateRoute()" class="route-btn">GoogleMap</button>
    <button onclick="drawRoute()" class="route-btn">地図表示</button>
    <button onclick="optimizeRoute()" class="opt-btn">最適化</button>
    <button onclick="clearRoute()" class="clear-btn">削除</button>
    <button id="toggleStart" class="toggle-btn" onclick="toggleStartMode()">現在地</button>
  </div>
</div>

<script>

const isMobile = window.matchMedia("(pointer: coarse)").matches;
if(isMobile) document.body.classList.add("mobile");

const PW_HASH="b25zZW4=";
const decode=s=>atob(s);

const MAPTILER_KEY="5803br5MI3qRfp9DVSHL";

let onsens=[],selected=[],map;
let startFromCurrent=false;

function showLoading(on){
  document.getElementById("loading").classList.toggle("active",on);
}

/* ログイン */
function login(){
  if(document.getElementById("pw").value!==decode(PW_HASH)){
    alert("違います");
    return;
  }
  document.getElementById("auth").style.opacity=0;
  setTimeout(()=>{
    document.getElementById("auth").style.display="none";
    document.getElementById("app").style.opacity=1;
    document.getElementById("app").style.transform="translateY(0)";
    init();
  },400);
}

/* 初期化 */
async function init(){
  await loadCSV();

  map=new maplibregl.Map({
    container:'map',
    style:`https://api.maptiler.com/maps/streets/style.json?key=${MAPTILER_KEY}`,
    center:[135.15,34.75],
    zoom:6
  });

  map.on('load',()=>{
    map.addSource('onsen',{type:'geojson',data:geo(),cluster:true});

    map.addLayer({
      id:'points',
      type:'circle',
      source:'onsen',
      paint:{
        'circle-radius':8,
        'circle-color':'#007aff'
      }
    });

    map.on('click','points',e=>{
      const id=e.features[0].properties.id;

      /* ★ ピンアニメ */
      map.easeTo({
        center:e.features[0].geometry.coordinates,
        zoom:map.getZoom()+0.3,
        duration:200
      });

      toggle(id);
    });

    renderSelected();
  });
}

/* CSV */
async function loadCSV(){
  const res=await fetch("onsen.csv");
  const text=await res.text();
  const lines=text.trim().split(/\r?\n/);

  onsens=lines.slice(1).map((l,i)=>{
    const c=l.split(",");
    return {id:i,name:c[0],lat:+c[1],lng:+c[2]};
  });
}

function geo(){
  return{
    type:'FeatureCollection',
    features:onsens.map(o=>({
      type:'Feature',
      geometry:{type:'Point',coordinates:[o.lng,o.lat]},
      properties:o
    }))
  };
}

/* UI */
function renderSelected(){
  if(isMobile) return;

  const el=document.getElementById("selected");
  el.innerHTML="";

  selected.forEach(i=>{
    const d=document.createElement("div");
    d.className="selected-item";
    d.innerHTML=`
      <span>${onsens[i].name}</span>
      <button class="remove-btn" onclick="removeItem(this,${i})">×</button>
    `;
    el.appendChild(d);
  });
}

/* ★ 削除アニメ */
function removeItem(btn,i){
  const item=btn.closest(".selected-item");
  item.classList.add("removing");

  setTimeout(()=>{
    selected=selected.filter(x=>x!==i);
    renderSelected();
  },200);
}

function toggle(i){
  selected.includes(i)
    ? selected=selected.filter(x=>x!==i)
    : selected.push(i);

  renderSelected();
}

/* ルート */
async function drawRoute(){
  showLoading(true);

  setTimeout(()=>{
    showLoading(false);
  },800);
}

/* 最適化 */
async function optimizeRoute(){
  showLoading(true);

  selected.sort((a,b)=>onsens[a].lat-onsens[b].lat);

  renderSelected();

  setTimeout(()=>{
    showLoading(false);
  },600);
}

function clearRoute(){}

function toggleStartMode(){
  startFromCurrent=!startFromCurrent;
  document.getElementById("toggleStart").classList.toggle("active",startFromCurrent);
}

function generateRoute(){
  alert("GoogleMap連携");
}

</script>
</body>
</html>
