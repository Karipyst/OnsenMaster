<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>温泉マップ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<style>
body { margin:0; font-family:sans-serif; background:#f5f1e6; }

/* ===== マップ ===== */
#map {
  position:fixed;
  top:0;
  width:100%;
  height:66vh;
  z-index:10;
}

/* ===== メイン ===== */
.main {
  margin-top:66vh;
  margin-bottom:90px;
  padding:10px;
}

.selected-container {
  background:#fff;
  border-radius:12px;
  padding:10px;
}

/* タイトル固定 */
.selected-title {
  font-weight:bold;
  position:sticky;
  top:0;
  background:#fff;
  padding-bottom:5px;
  z-index:1;
}

/* リストのみスクロール */
.selected-list {
  max-height:30vh;
  overflow-y:auto;
}

.selected-item {
  padding:10px;
  margin:5px 0;
  background:#eee;
  border-radius:8px;
  cursor:grab;
}

/* ===== フッター ===== */
.footer {
  position:fixed;
  bottom:0;
  width:100%;
  background:#fff;
  border-top:1px solid #ccc;
  padding:10px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
}

.route-btn {
  padding:14px 24px;
  font-size:16px;
  background:#e67e22;
  color:#fff;
  border:none;
  border-radius:10px;
}

.toggle-btn {
  padding:10px;
  font-size:12px;
  background:#ccc;
  border:none;
  border-radius:8px;
}

.toggle-btn.active {
  background:#e67e22;
  color:#fff;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="main">
  <div class="selected-container">
    <div class="selected-title">選択ルート</div>
    <div id="selected" class="selected-list"></div>
  </div>
</div>

<div class="footer">
  <button onclick="generateRoute()" class="route-btn">GoogleMap</button>
  <button id="toggleStart" class="toggle-btn active" onclick="toggleStartMode()">現在地</button>
</div>

<script>

const MAPTILER_KEY = "5803br5MI3qRfp9DVSHL";

let onsens = [];
let selected = [];
let map;
let startFromCurrent = true;

/* ===== CSV ===== */
async function loadCSV(){
  const res = await fetch("onsen.csv");
  let text = await res.text();
  text = text.replace(/^\uFEFF/, '');
  const lines = text.trim().split(/\r?\n/);

  onsens = lines.slice(1).map(line=>{
    const cols = line.split(",");
    return {
      name: cols[0],
      lat: Number(cols[1]),
      lng: Number(cols[2]),
      type: cols[3]
    };
  });
}

/* ===== 初期化 ===== */
async function initMap(){

  await loadCSV();

  map = new maplibregl.Map({
    container:'map',
    style:`https://api.maptiler.com/maps/streets/style.json?key=${MAPTILER_KEY}`,
    center:[135.15,34.75],
    zoom:6
  });

  map.addControl(new maplibregl.NavigationControl());

  map.on('load', () => {
    map.resize();
    setupSource();
    renderSelected();
  });
}

initMap();

/* ===== Source ===== */
function setupSource(){

  map.addSource('onsens', {
    type:'geojson',
    data: makeGeoJSON(),
    cluster:true,
    clusterMaxZoom:10,
    clusterRadius:50
  });

  const typeColor = [
    'match',['get','type'],
    '塩化物泉','#e74c3c',
    '炭酸泉','#3498db',
    '単純温泉','#7f8c8d',
    '含鉄泉','#d2691e',
    '#95a5a6'
  ];

  /* クラスタ */
  map.addLayer({
    id:'clusters',
    type:'circle',
    source:'onsens',
    filter:['has','point_count'],
    paint:{
      'circle-color':'#f3d7c1',
      'circle-radius':['step',['get','point_count'],15,10,20,30,25]
    }
  });

  map.addLayer({
    id:'cluster-count',
    type:'symbol',
    source:'onsens',
    filter:['has','point_count'],
    layout:{
      'text-field':['get','point_count'],
      'text-size':12
    },
    paint:{ 'text-color':'#000' }
  });

  /* 単体 */
  map.addLayer({
    id:'unclustered',
    type:'circle',
    source:'onsens',
    filter:['!has','point_count'],
    paint:{
      'circle-color': typeColor,
      'circle-radius':10,
      'circle-stroke-width':2,
      'circle-stroke-color':'#fff'
    }
  });

  /* 選択 */
  map.addLayer({
    id:'selected',
    type:'circle',
    source:'onsens',
    filter:['in','id',-1],
    paint:{
      'circle-color': typeColor,
      'circle-radius':14,
      'circle-stroke-width':3,
      'circle-stroke-color':'#fff'
    }
  });

  /* 番号 */
  map.addLayer({
    id:'labels',
    type:'symbol',
    source:'onsens',
    filter:['in','id',-1],
    layout:{
      'text-field':['get','order'],
      'text-size':12
    },
    paint:{ 'text-color':'#fff' }
  });

  /* ===== 吹き出し（ズーム OR 選択） ===== */
  map.addLayer({
    id:'name-label',
    type:'symbol',
    source:'onsens',
    filter:[
      'all',
      ['!has','point_count'],
      ['any',
        ['>=',['zoom'],11],
        ['in',['get','id'],['literal', selected]]
      ]
    ],
    layout:{
      'text-field':['get','name'],
      'text-size':11,
      'text-offset':[0.8,-0.8],
      'text-anchor':'left'
    },
    paint:{
      'text-color':'#000',
      'text-halo-color':'#fff',
      'text-halo-width':4
    }
  });

  map.moveLayer('selected');
  map.moveLayer('labels');

  map.on('click','unclustered', e=>{
    toggle(Number(e.features[0].properties.id));
  });

  map.on('click','clusters', e=>{
    const features = map.queryRenderedFeatures(e.point,{layers:['clusters']});
    const clusterId = features[0].properties.cluster_id;

    map.getSource('onsens').getClusterExpansionZoom(clusterId,(err,zoom)=>{
      map.easeTo({
        center:features[0].geometry.coordinates,
        zoom
      });
    });
  });
}

/* ===== GeoJSON ===== */
function makeGeoJSON(){
  return {
    type:'FeatureCollection',
    features: onsens.map((o,i)=>({
      type:'Feature',
      geometry:{type:'Point',coordinates:[o.lng,o.lat]},
      properties:{
        id:i,
        name:o.name,
        type:o.type,
        order: selected.indexOf(i)>=0 ? String(selected.indexOf(i)+1) : ''
      }
    }))
  };
}

/* ===== 更新 ===== */
function update(){
  map.getSource('onsens').setData(makeGeoJSON());

  map.setFilter('selected',['in','id',...selected]);
  map.setFilter('labels',['in','id',...selected]);

  /* ラベル再適用（OR条件） */
  map.setFilter('name-label',[
    'all',
    ['!has','point_count'],
    ['any',
      ['>=',['zoom'],11],
      ['in',['get','id'],['literal', selected]]
    ]
  ]);
}

/* ===== UI ===== */
function renderSelected(){
  const el=document.getElementById("selected");
  el.innerHTML="";

  selected.forEach(i=>{
    const d=document.createElement("div");
    d.className="selected-item";
    d.dataset.id=i;
    d.innerText=onsens[i].name;
    el.appendChild(d);
  });

  new Sortable(el,{
    animation:150,
    onEnd:()=>{
      selected=[...el.children].map(e=>parseInt(e.dataset.id));
      update();
    }
  });
}

function toggle(i){
  if(selected.includes(i)){
    selected=selected.filter(x=>x!==i);
  }else{
    selected.push(i);
  }
  update();
  renderSelected();
}

/* ===== ボタン ===== */
function toggleStartMode(){
  startFromCurrent=!startFromCurrent;
  document.getElementById("toggleStart").classList.toggle("active",startFromCurrent);
}

function generateRoute(){
  if(selected.length<1) return;

  const route=selected.map(i=>onsens[i]);
  const names=route.map(o=>encodeURIComponent(o.name));

  let url;

  if(startFromCurrent){
    url=`https://www.google.com/maps/dir/?api=1&origin=Current+Location&destination=${names.at(-1)}&waypoints=${names.slice(0,-1).join('|')}`;
  }else{
    url=`https://www.google.com/maps/dir/?api=1&origin=${names[0]}&destination=${names.at(-1)}&waypoints=${names.slice(1,-1).join('|')}`;
  }

  window.open(url);
}

</script>
</body>
</html>
