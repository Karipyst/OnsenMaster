<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>温泉マップ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<style>

/* ===== 全体 ===== */
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#0f172a;
  color:#fff;
  overflow:hidden;
}

/* ===== ログイン画面 ===== */
#auth{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  transition:opacity .6s ease, transform .6s ease;
}

.auth-card{
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.08);
  padding:32px;
  border-radius:20px;
  width:280px;
  text-align:center;
  box-shadow:0 20px 50px rgba(0,0,0,0.4);
}

.auth-card h1{
  font-size:18px;
  margin-bottom:20px;
}

.auth-card input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  margin-bottom:12px;
  font-size:14px;
}

.auth-card button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#22c55e;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
  transition:.2s;
}
.auth-card button:hover{
  transform:translateY(-2px);
}

/* ===== 本体 ===== */
#app{
  opacity:0;
  transform:translateY(20px);
  transition:all .6s ease;
}

#map{
  position:fixed;
  top:0;
  width:100%;
  height:65vh;
}

.main{
  margin-top:65vh;
  padding:12px;
  background:#f2f2f7;
  color:#000;
}

.selected-container{
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.75);
  border-radius:16px;
  padding:14px;
}

.selected-item{
  padding:10px;
  margin:6px 0;
  background:rgba(0,0,0,0.05);
  border-radius:10px;
}

/* フッター */
.footer{
  position:fixed;
  bottom:0;
  width:100%;
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.75);
  padding:10px;
  display:flex;
  justify-content:center;
  gap:8px;
  flex-wrap:wrap;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:12px;
  font-size:13px;
}

.route-btn{ background:#007aff;color:#fff;}
.clear-btn{ background:#ff3b30;color:#fff;}
.opt-btn{ background:#34c759;color:#fff;}

.toggle-btn{ background:#d1d1d6;}
.toggle-btn.active{ background:#34c759;color:#fff;}

</style>
</head>

<body>

<!-- ===== 認証画面 ===== -->
<div id="auth">
  <div class="auth-card">
    <h1>温泉マップ</h1>
    <input type="password" id="pw" placeholder="パスワード">
    <button onclick="login()">ログイン</button>
  </div>
</div>

<!-- ===== 本体 ===== -->
<div id="app">
  <div id="map"></div>

  <div class="main">
    <div class="selected-container">
      <div>選択ルート</div>
      <div id="selected"></div>
    </div>
  </div>

  <div class="footer">
    <button onclick="generateRoute()" class="route-btn">GoogleMap</button>
    <button onclick="drawRoute()" class="route-btn">地図表示</button>
    <button onclick="optimizeRoute()" class="opt-btn">最適化</button>
    <button onclick="clearRoute()" class="clear-btn">削除</button>
    <button id="toggleStart" class="toggle-btn active" onclick="toggleStartMode()">現在地</button>
  </div>
</div>

<script>

const PASSWORD="onsen";
const MAPTILER_KEY="5803br5MI3qRfp9DVSHL";

let onsens=[],selected=[],map;
let startFromCurrent=true;

/* ===== ログイン ===== */
function login(){
  const val=document.getElementById("pw").value;
  if(val!==PASSWORD){
    alert("パスワード違います");
    return;
  }

  const auth=document.getElementById("auth");
  const app=document.getElementById("app");

  auth.style.opacity=0;
  auth.style.transform="scale(1.05)";

  setTimeout(()=>{
    auth.style.display="none";
    app.style.opacity=1;
    app.style.transform="translateY(0)";
    init();
  },500);
}

/* ===== 初期化 ===== */
async function init(){
  await loadCSV();

  map=new maplibregl.Map({
    container:'map',
    style:`https://api.maptiler.com/maps/streets/style.json?key=${MAPTILER_KEY}`,
    center:[135.15,34.75],
    zoom:6
  });

  map.on('load',()=>{
    setup();
    renderSelected();

    map.addSource('route',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
    map.addLayer({
      id:'route-line',
      type:'line',
      source:'route',
      paint:{'line-color':'#007aff','line-width':4}
    });
  });
}

/* ===== CSV ===== */
async function loadCSV(){
  const res=await fetch("onsen.csv");
  const text=await res.text();
  const lines=text.trim().split(/\r?\n/);

  onsens=lines.slice(1).map(l=>{
    const c=l.split(",");
    return {name:c[0],lat:+c[1],lng:+c[2]};
  });
}

/* ===== 地図 ===== */
function setup(){
  map.addSource('onsen',{type:'geojson',data:geo(),cluster:true});

  map.addLayer({
    id:'points',
    type:'circle',
    source:'onsen',
    paint:{'circle-radius':8,'circle-color':'#007aff'}
  });

  map.on('click','points',e=>{
    toggle(e.features[0].properties.id);
  });
}

function geo(){
  return{
    type:'FeatureCollection',
    features:onsens.map((o,i)=>({
      type:'Feature',
      geometry:{type:'Point',coordinates:[o.lng,o.lat]},
      properties:{id:i}
    }))
  };
}

/* ===== 最適化 + 自動描画 ===== */
async function optimizeRoute(){

  if(selected.length<2) return;

  const rem=[...selected];
  const res=[];

  let cur=rem.shift();
  res.push(cur);

  while(rem.length){
    let ni=0,nd=Infinity;
    rem.forEach((i,idx)=>{
      const d=Math.hypot(
        onsens[cur].lat-onsens[i].lat,
        onsens[cur].lng-onsens[i].lng
      );
      if(d<nd){nd=d;ni=idx;}
    });
    cur=rem.splice(ni,1)[0];
    res.push(cur);
  }

  selected=res;
  renderSelected();

  await drawRoute(true); // ★ アニメーション付き
}

/* ===== ルート描画（アニメーション） ===== */
async function drawRoute(animate=false){

  if(selected.length<2) return;

  const coords=selected.map(i=>{
    const o=onsens[i];
    return `${o.lng},${o.lat}`;
  }).join(';');

  const url=`https://router.project-osrm.org/route/v1/driving/${coords}?overview=full&geometries=geojson`;

  const res=await fetch(url);
  const data=await res.json();

  const line=data.routes[0].geometry.coordinates;

  if(!animate){
    map.getSource('route').setData({
      type:'Feature',
      geometry:{type:'LineString',coordinates:line}
    });
    return;
  }

  // ★ アニメーション描画
  let i=0;
  const partial=[];

  function step(){
    if(i>=line.length) return;

    partial.push(line[i]);

    map.getSource('route').setData({
      type:'Feature',
      geometry:{type:'LineString',coordinates:partial}
    });

    i++;
    requestAnimationFrame(step);
  }
  step();
}

/* ===== その他 ===== */
function toggle(i){
  selected.includes(i)
    ? selected=selected.filter(x=>x!==i)
    : selected.push(i);
  renderSelected();
}

function renderSelected(){
  const el=document.getElementById("selected");
  el.innerHTML="";
  selected.forEach(i=>{
    const d=document.createElement("div");
    d.className="selected-item";
    d.innerText=onsens[i].name;
    el.appendChild(d);
  });
}

function clearRoute(){
  map.getSource('route').setData({type:'FeatureCollection',features:[]});
}

function toggleStartMode(){
  startFromCurrent=!startFromCurrent;
  document.getElementById("toggleStart").classList.toggle("active",startFromCurrent);
}

function generateRoute(){
  if(!selected.length) return;
  const names=selected.map(i=>encodeURIComponent(onsens[i].name));

  let url=startFromCurrent
    ? `https://www.google.com/maps/dir/?api=1&origin=Current+Location&destination=${names.at(-1)}&waypoints=${names.slice(0,-1).join('|')}`
    : `https://www.google.com/maps/dir/?api=1&origin=${names[0]}&destination=${names.at(-1)}&waypoints=${names.slice(1,-1).join('|')}`;

  window.open(url);
}

</script>
</body>
</html>
