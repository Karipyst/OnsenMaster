<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>温泉マップ</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#f2f2f7;
}

/* ===== フッター高さ固定 ===== */
:root{
  --footer-h:88px;
}

/* ===== マップ ===== */
#map{
  position:fixed;
  top:0;
  width:100%;
  height:calc(100dvh - var(--footer-h));
}

/* ===== フッター ===== */
.footer{
  position:fixed;
  bottom:0;
  width:100%;
  height:var(--footer-h);
  padding:8px 6px calc(env(safe-area-inset-bottom) + 6px);
  display:flex;
  justify-content:center;
  align-items:center;
  gap:6px;
  flex-wrap:wrap;
  background:rgba(255,255,255,0.95);
  backdrop-filter:blur(20px);
}

/* ===== ボタン ===== */
button{
  padding:8px 10px;
  font-size:12px;
  border:none;
  border-radius:10px;
  white-space:nowrap;
}

.route-btn{background:#007aff;color:#fff;}
.opt-btn{background:#34c759;color:#fff;}
.clear-btn{background:#ff3b30;color:#fff;}
.toggle-btn{background:#d1d1d6;}
.toggle-btn.active{background:#34c759;color:#fff;}

/* ===== 選択リスト ===== */
#selected{
  position:fixed;
  top:10px;
  left:10px;
  width:260px;
  max-height:40vh;
  overflow-y:auto;
  z-index:5;
}

.selected-item{
  padding:10px;
  margin:6px 0;
  background:#fff;
  border-radius:10px;
  cursor:grab;
  font-size:13px;
}

.selected-item.dragging{
  opacity:0.5;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="selected"></div>

<div class="footer">
  <button onclick="generateRoute()" class="route-btn">GoogleMap</button>
  <button onclick="drawRoute()" class="route-btn">地図</button>
  <button onclick="optimizeRoute()" class="opt-btn">最適化</button>
  <button onclick="clearRoute()" class="clear-btn">削除</button>
  <button id="toggleStart" class="toggle-btn" onclick="toggleStartMode()">現在地</button>
</div>

<script>

const MAPTILER_KEY="5803br5MI3qRfp9DVSHL";

let map,onsens=[],selected=[],startFromCurrent=false;

/* ===== 初期化 ===== */
async function init(){
  await loadCSV();

  map=new maplibregl.Map({
    container:'map',
    style:`https://api.maptiler.com/maps/streets/style.json?key=${MAPTILER_KEY}`,
    center:[135.15,34.75],
    zoom:6,
    pixelRatio: window.devicePixelRatio > 2 ? 2 : window.devicePixelRatio
  });

  map.on('load',()=>{
    setupMap();
    fitAll();
    renderSelected();
  });

  window.addEventListener("resize",()=>map.resize());
}

/* ===== 全体フィット ===== */
function fitAll(){
  if(!onsens.length) return;

  const bounds=new maplibregl.LngLatBounds();
  onsens.forEach(o=>bounds.extend([o.lng,o.lat]));

  map.fitBounds(bounds,{
    padding:{
      top:40,
      bottom:120,
      left:40,
      right:40
    },
    duration:0
  });
}

/* ===== CSV ===== */
async function loadCSV(){
  const txt=await (await fetch("onsen.csv")).text();
  onsens=txt.split(/\n/).slice(1).map((l,i)=>{
    const c=l.split(",");
    return {
      id:i,
      name:c[0],
      lat:+c[1],
      lng:+c[2]
    };
  });
}

/* ===== 地図 ===== */
function setupMap(){
  map.addSource('onsen',{type:'geojson',data:geo()});

  map.addLayer({
    id:'points',
    type:'circle',
    source:'onsen',
    paint:{
      'circle-radius':8,
      'circle-color':'#007aff'
    }
  });

  map.on('click','points',e=>{
    toggle(e.features[0].properties.id);
  });
}

function geo(){
  return{
    type:'FeatureCollection',
    features:onsens.map(o=>({
      type:'Feature',
      geometry:{
        type:'Point',
        coordinates:[o.lng,o.lat]
      },
      properties:{
        id:o.id,
        name:o.name
      }
    }))
  };
}

/* ===== 選択処理 ===== */
function toggle(i){
  if(selected.includes(i)){
    selected=selected.filter(x=>x!==i);
  }else{
    selected.push(i);
  }
  renderSelected();
}

/* ===== 並び替え ===== */
function renderSelected(){
  const el=document.getElementById("selected");
  el.innerHTML="";

  selected.forEach((i,idx)=>{
    const d=document.createElement("div");
    d.className="selected-item";
    d.draggable=true;
    d.dataset.index=idx;
    d.innerText=onsens[i].name;

    d.addEventListener("dragstart",e=>{
      d.classList.add("dragging");
      e.dataTransfer.setData("text/plain",idx);
    });

    d.addEventListener("dragend",()=>{
      d.classList.remove("dragging");
    });

    d.addEventListener("dragover",e=>{
      e.preventDefault();
    });

    d.addEventListener("drop",e=>{
      e.preventDefault();

      const from=+e.dataTransfer.getData("text");
      const to=idx;

      const moved=selected.splice(from,1)[0];
      selected.splice(to,0,moved);

      renderSelected();
    });

    el.appendChild(d);
  });
}

/* ===== ルート描画（簡易） ===== */
async function drawRoute(){
  if(selected.length<2)return;

  const coords=selected.map(i=>{
    const o=onsens[i];
    return `${o.lng},${o.lat}`;
  });

  const res=await fetch(`https://router.project-osrm.org/route/v1/driving/${coords.join(";")}?overview=full&geometries=geojson`);
  const data=await res.json();

  if(!map.getSource('route')){
    map.addSource('route',{type:'geojson',data:{}});
    map.addLayer({
      id:'route',
      type:'line',
      source:'route',
      paint:{'line-color':'#007aff','line-width':4}
    });
  }

  map.getSource('route').setData({
    type:'Feature',
    geometry:data.routes[0].geometry
  });
}

/* ===== 最適化 ===== */
function optimizeRoute(){
  selected.sort((a,b)=>onsens[a].lat-onsens[b].lat);
  renderSelected();
}

/* ===== 削除 ===== */
function clearRoute(){
  selected=[];
  renderSelected();
  if(map.getSource('route')){
    map.getSource('route').setData({type:'FeatureCollection',features:[]});
  }
}

/* ===== GoogleMap ===== */
function generateRoute(){
  if(!selected.length)return;

  const names=selected.map(i=>onsens[i].name);

  const origin=startFromCurrent
    ? "Current+Location"
    : encodeURIComponent(names[0]);

  const destination=encodeURIComponent(names.at(-1));

  const waypoints=names
    .slice(1,-1)
    .map(n=>encodeURIComponent(n))
    .join("|");

  let url=`https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${destination}`;

  if(waypoints){
    url+=`&waypoints=${waypoints}`;
  }

  window.open(url);
}

/* ===== 現在地トグル ===== */
function toggleStartMode(){
  startFromCurrent=!startFromCurrent;
  document.getElementById("toggleStart").classList.toggle("active",startFromCurrent);
}

/* ===== 起動 ===== */
init();

</script>
</body>
</html>
