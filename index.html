<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>温泉マップ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#f2f2f7;
}

/* ===== 認証 ===== */
#auth{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  z-index:10;
  transition:all .6s ease;
}

.auth-card{
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.1);
  padding:30px;
  border-radius:20px;
  width:260px;
  text-align:center;
  transform:scale(1);
  transition:.4s;
}

.auth-title{
  color:#fff;
  margin-bottom:12px;
}

.auth-card input,
.auth-card button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-bottom:10px;
}

.auth-card button{
  background:#34c759;
  color:#fff;
}

/* ===== 本体 ===== */
#app{
  position:fixed;
  inset:0;
  opacity:0;
  transform:translateY(20px);
  transition:.6s ease;
}

#map{
  position:fixed;
  top:0;
  width:100%;
  height:65vh;
}

/* PCリスト */
.main{
  margin-top:65vh;
  padding:12px;
}

#selected{
  max-height:220px;
  overflow-y:auto;
}

.selected-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  margin:6px 0;
  background:#fff;
  border-radius:10px;
}

/* ★ Apple削除ボタン */
.remove-btn{
  width:26px;
  height:26px;
  border-radius:50%;
  background:#e5e5ea;
  display:flex;
  align-items:center;
  justify-content:center;
  border:none;
}
.remove-btn span{
  transform:translateY(-1px);
}

/* フッター */
.footer{
  position:fixed;
  bottom:env(safe-area-inset-bottom);
  width:100%;
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.9);
  padding:10px;
  display:flex;
  justify-content:center;
  gap:8px;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:12px;
}

.route-btn{ background:#007aff;color:#fff;}
.clear-btn{ background:#ff3b30;color:#fff;}
.opt-btn{ background:#34c759;color:#fff;}

.toggle-btn{ background:#d1d1d6;}
.toggle-btn.active{ background:#34c759;color:#fff;}

/* モバイル */
.mobile #map{ height:100vh; }
.mobile .main{ display:none; }

</style>
</head>

<body>

<div id="auth">
  <div class="auth-card">
    <div class="auth-title">温泉マップ</div>
    <input type="password" id="pw" placeholder="パスワード">
    <button onclick="login()">ログイン</button>
  </div>
</div>

<div id="app">
  <div id="map"></div>

  <div class="main">
    <div id="selected"></div>
  </div>

  <div class="footer">
    <button onclick="generateRoute()" class="route-btn">GoogleMap</button>
    <button onclick="drawRoute()" class="route-btn">地図表示</button>
    <button onclick="optimizeRoute()" class="opt-btn">最適化</button>
    <button onclick="clearRoute()" class="clear-btn">削除</button>
    <button id="toggleStart" class="toggle-btn" onclick="toggleStartMode()">現在地</button>
  </div>
</div>

<script>

const isMobile = window.matchMedia("(pointer: coarse)").matches;
if(isMobile) document.body.classList.add("mobile");

const PW_HASH="b25zZW4=";
const decode=s=>atob(s);

const MAPTILER_KEY="5803br5MI3qRfp9DVSHL";

let onsens=[],selected=[],map;
let startFromCurrent=false;

const typeColor={
  "塩化物泉":"#e74c3c",
  "炭酸泉":"#3498db",
  "単純温泉":"#95a5a6",
  "含鉄泉":"#d35400"
};

function login(){
  if(document.getElementById("pw").value!==decode(PW_HASH)){
    alert("パスワード違います");
    return;
  }

  const auth=document.getElementById("auth");
  const app=document.getElementById("app");

  auth.style.opacity=0;
  auth.style.transform="scale(1.05)";

  setTimeout(()=>{
    auth.style.display="none";
    app.style.opacity=1;
    app.style.transform="translateY(0)";
    init();
  },400);
}

/* 初期化 */
async function init(){
  await loadCSV();

  map=new maplibregl.Map({
    container:'map',
    style:`https://api.maptiler.com/maps/streets/style.json?key=${MAPTILER_KEY}`,
    center:[135.15,34.75],
    zoom:6
  });

  map.on('load',()=>{
    setup();
    renderSelected();

    map.addSource('route',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
    map.addLayer({
      id:'route-line',
      type:'line',
      source:'route',
      paint:{'line-color':'#007aff','line-width':4}
    });
  });
}

async function loadCSV(){
  const res=await fetch("onsen.csv");
  const text=await res.text();
  const lines=text.trim().split(/\r?\n/);

  onsens=lines.slice(1).map(l=>{
    const c=l.split(",");
    return {name:c[0],lat:+c[1],lng:+c[2],type:c[3]};
  });
}

/* 地図 */
function setup(){
  map.addSource('onsen',{type:'geojson',data:geo(),cluster:true});

  map.addLayer({
    id:'cluster',
    type:'circle',
    source:'onsen',
    filter:['has','point_count'],
    paint:{'circle-color':'#636e72','circle-radius':18}
  });

  map.addLayer({
    id:'cluster-count',
    type:'symbol',
    source:'onsen',
    filter:['has','point_count'],
    layout:{'text-field':['get','point_count']},
    paint:{'text-color':'#fff'}
  });

  map.addLayer({
    id:'points',
    type:'circle',
    source:'onsen',
    filter:['!has','point_count'],
    paint:{
      'circle-color':['get','color'],
      'circle-radius':8,
      'circle-stroke-width':1,
      'circle-stroke-color':'#fff'
    }
  });

  /* ★ 選択強調 */
  map.addLayer({
    id:'selected',
    type:'circle',
    source:'onsen',
    filter:['in','id',-1],
    paint:{
      'circle-color':['get','color'],
      'circle-radius':14,
      'circle-stroke-width':3,
      'circle-stroke-color':'#f1c40f'
    }
  });

  /* ★ 番号 */
  map.addLayer({
    id:'order',
    type:'symbol',
    source:'onsen',
    filter:['in','id',-1],
    layout:{
      'text-field':['get','order'],
      'text-size':12
    },
    paint:{'text-color':'#fff'}
  });

  /* ラベル */
  map.addLayer({
    id:'label',
    type:'symbol',
    source:'onsen',
    filter:['!has','point_count'],
    layout:{
      'text-field':['get','name'],
      'text-size':10,
      'text-offset':[0,1.2]
    },
    paint:{
      'text-halo-color':'#fff',
      'text-halo-width':2
    }
  });

  map.moveLayer('selected');
  map.moveLayer('order');

  map.on('click','points',e=>{
    toggle(e.features[0].properties.id);
  });

  map.on('click','cluster',e=>{
    const f=map.queryRenderedFeatures(e.point,{layers:['cluster']})[0];
    map.getSource('onsen').getClusterExpansionZoom(f.properties.cluster_id,(err,zoom)=>{
      map.easeTo({center:f.geometry.coordinates,zoom});
    });
  });
}

function geo(){
  return{
    type:'FeatureCollection',
    features:onsens.map((o,i)=>({
      type:'Feature',
      geometry:{type:'Point',coordinates:[o.lng,o.lat]},
      properties:{
        id:i,
        name:o.name,
        color:typeColor[o.type]||'#7f8c8d',
        order:selected.includes(i)?String(selected.indexOf(i)+1):""
      }
    }))
  };
}

function update(){
  map.getSource('onsen').setData(geo());
  map.setFilter('selected',['in','id',...selected]);
  map.setFilter('order',['in','id',...selected]);
}

/* ★ ルートアニメーション */
async function drawRoute(){
  if(selected.length<2) return;

  const coords=selected.map(i=>{
    const o=onsens[i];
    return `${o.lng},${o.lat}`;
  }).join(';');

  const res=await fetch(`https://router.project-osrm.org/route/v1/driving/${coords}?overview=full&geometries=geojson`);
  const data=await res.json();

  const line=data.routes[0].geometry.coordinates;

  let i=0;
  const partial=[];

  function step(){
    for(let j=0;j<25 && i<line.length;j++,i++){
      partial.push(line[i]);
    }

    map.getSource('route').setData({
      type:'Feature',
      geometry:{type:'LineString',coordinates:partial}
    });

    if(i<line.length) requestAnimationFrame(step);
  }
  step();
}

/* 最適化 */
async function optimizeRoute(){
  if(selected.length<2) return;

  selected.sort((a,b)=>onsens[a].lat-onsens[b].lat);

  update();
  renderSelected();
  await drawRoute();
}

/* UI */
function renderSelected(){
  if(isMobile) return;

  const el=document.getElementById("selected");
  el.innerHTML="";

  selected.forEach(i=>{
    const d=document.createElement("div");
    d.className="selected-item";
    d.innerHTML=`
      <span>${onsens[i].name}</span>
      <button class="remove-btn" onclick="removeItem(${i})"><span>×</span></button>
    `;
    el.appendChild(d);
  });
}

function removeItem(i){
  selected=selected.filter(x=>x!==i);
  update();
  renderSelected();
}

function toggle(i){
  selected.includes(i)
    ? selected=selected.filter(x=>x!==i)
    : selected.push(i);

  update();
  renderSelected();
}

function clearRoute(){
  map.getSource('route').setData({type:'FeatureCollection',features:[]});
}

function toggleStartMode(){
  startFromCurrent=!startFromCurrent;
  document.getElementById("toggleStart").classList.toggle("active",startFromCurrent);
}

function generateRoute(){
  if(!selected.length) return;

  const names=selected.map(i=>encodeURIComponent(onsens[i].name));

  let url=startFromCurrent
    ? `https://www.google.com/maps/dir/?api=1&origin=Current+Location&destination=${names.at(-1)}&waypoints=${names.slice(0,-1).join('|')}`
    : `https://www.google.com/maps/dir/?api=1&origin=${names[0]}&destination=${names.at(-1)}&waypoints=${names.slice(1,-1).join('|')}`;

  window.open(url);
}

</script>
</body>
</html>
