<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>温泉マップ</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#f2f2f7;
}

/* ★ フッター高さ変数 */
:root{
  --footer-h:90px;
}

/* ローディング */
#loading{
  position:fixed;inset:0;
  display:flex;justify-content:center;align-items:center;
  background:rgba(0,0,0,0.25);
  opacity:0;pointer-events:none;transition:.3s;
  z-index:20;
}
#loading.active{opacity:1;pointer-events:auto;}
.spinner{
  width:40px;height:40px;
  border:4px solid #fff;border-top:4px solid transparent;
  border-radius:50%;animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* 認証 */
#auth{
  position:fixed;inset:0;
  display:flex;justify-content:center;align-items:center;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  z-index:10;
}
.auth-card{
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.1);
  padding:30px;border-radius:20px;
  width:260px;text-align:center;
}
.auth-title{color:#fff;margin-bottom:12px;}
.auth-card input,.auth-card button{
  width:100%;padding:12px;border:none;border-radius:10px;margin-bottom:10px;
}
.auth-card button{background:#34c759;color:#fff;}

/* 本体 */
#app{
  position:fixed;
  inset:0;
  opacity:0;
  transition:.5s;
}

/* ★ マップ修正（重要） */
#map{
  position:fixed;
  top:0;
  width:100%;
  height:calc(100dvh - var(--footer-h));
}

/* PCリスト */
.main{
  margin-top:65vh;
  padding:12px;
}

#selected{
  max-height:220px;
  overflow-y:auto;
}

.selected-item{
  display:flex;
  justify-content:space-between;
  padding:10px;
  margin:6px 0;
  background:#fff;
  border-radius:10px;
  cursor:grab;
}

.selected-item.dragging{
  opacity:0.5;
}

/* フッター */
.footer{
  position:fixed;
  bottom:0;
  width:100%;
  height:var(--footer-h);
  padding:10px;
  display:flex;
  justify-content:center;
  gap:8px;
  flex-wrap:wrap;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(20px);
}

button{
  padding:10px 12px;
  border:none;border-radius:12px;
}
.route-btn{background:#007aff;color:#fff;}
.opt-btn{background:#34c759;color:#fff;}
.clear-btn{background:#ff3b30;color:#fff;}
.toggle-btn{background:#d1d1d6;}
.toggle-btn.active{background:#34c759;color:#fff;}
</style>
</head>

<body>

<div id="loading"><div class="spinner"></div></div>

<div id="auth">
  <div class="auth-card">
    <div class="auth-title">温泉マップ</div>
    <input type="password" id="pw">
    <button onclick="login()">ログイン</button>
  </div>
</div>

<div id="app">
  <div id="map"></div>

  <div class="main">
    <div id="selected"></div>
  </div>

  <div class="footer">
    <button onclick="generateRoute()" class="route-btn">GoogleMap</button>
    <button onclick="drawRoute()" class="route-btn">地図表示</button>
    <button onclick="optimizeRoute()" class="opt-btn">最適化</button>
    <button onclick="clearRoute()" class="clear-btn">削除</button>
    <button id="toggleStart" class="toggle-btn" onclick="toggleStartMode()">現在地</button>
  </div>
</div>

<script>

const isMobile = window.matchMedia("(pointer: coarse)").matches;

const PW_HASH="b25zZW4=";
const MAPTILER_KEY="5803br5MI3qRfp9DVSHL";

let map,onsens=[],selected=[],startFromCurrent=false;

/* ★ 初期フィット */
function fitAll(){
  const bounds=new maplibregl.LngLatBounds();
  onsens.forEach(o=>bounds.extend([o.lng,o.lat]));
  map.fitBounds(bounds,{padding:{top:40,bottom:120,left:40,right:40}});
}

/* ログイン */
function login(){
  if(atob(PW_HASH)!==pw.value){alert("違います");return;}
  document.getElementById("auth").style.display="none";
  document.getElementById("app").style.opacity=1;
  init();
}

/* 初期化 */
async function init(){
  await loadCSV();

  map=new maplibregl.Map({
    container:'map',
    style:`https://api.maptiler.com/maps/streets/style.json?key=${MAPTILER_KEY}`,
    center:[135.15,34.75],
    zoom:6
  });

  map.on('load',()=>{
    setupMap();
    fitAll(); /* ★追加 */
  });

  window.addEventListener("resize",()=>map.resize());
}

/* CSV */
async function loadCSV(){
  const txt=await (await fetch("onsen.csv")).text();
  onsens=txt.split(/\n/).slice(1).map((l,i)=>{
    const c=l.split(",");
    return {id:i,name:c[0],lat:+c[1],lng:+c[2],type:c[3]};
  });
}

/* ===== 並び替え対応 ===== */
function renderSelected(){
  if(isMobile) return;

  const el=document.getElementById("selected");
  el.innerHTML="";

  selected.forEach((i,idx)=>{
    const d=document.createElement("div");
    d.className="selected-item";
    d.draggable=true;
    d.innerHTML=`
      <span>${onsens[i].name}</span>
      <button onclick="removeItem(${i})">×</button>
    `;

    d.addEventListener("dragstart",e=>{
      d.classList.add("dragging");
      e.dataTransfer.setData("text",idx);
    });

    d.addEventListener("dragend",()=>{
      d.classList.remove("dragging");
    });

    d.addEventListener("drop",e=>{
      e.preventDefault();
      const from=+e.dataTransfer.getData("text");
      const to=idx;
      const moved=selected.splice(from,1)[0];
      selected.splice(to,0,moved);
      renderSelected();
    });

    d.addEventListener("dragover",e=>e.preventDefault());

    el.appendChild(d);
  });
}

/* ===== GoogleMap修正 ===== */
function generateRoute(){
  if(!selected.length)return;

  const names=selected.map(i=>onsens[i].name);

  const origin=startFromCurrent
    ? "Current+Location"
    : encodeURIComponent(names[0]);

  const destination=encodeURIComponent(names.at(-1));

  const waypoints=names
    .slice(1,-1)
    .map(n=>encodeURIComponent(n))
    .join("|");

  let url=`https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${destination}`;
  if(waypoints) url+=`&waypoints=${waypoints}`;

  window.open(url);
}

</script>
</body>
</html>
