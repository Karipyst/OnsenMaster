<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>温泉マップ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<style>
body { margin:0; font-family:sans-serif; background:#f5f1e6; }
#map { height:45dvh; }

.card {
  margin:10px; padding:15px;
  background:#fff; border-radius:12px;
  cursor:pointer; border:2px solid transparent;
}
.card.active {
  border:2px solid #e67e22;
  background:#fff7ed;
}

.selected-list {
  margin:10px; padding:10px;
  background:#fff; border-radius:12px;
}
.selected-item {
  padding:10px; margin:5px 0;
  background:#eee; border-radius:8px;
  cursor:grab;
}

.route-btn {
  width:100%; padding:14px;
  margin-top:10px;
  font-size:16px;
  background:#e67e22;
  color:#fff;
  border:none;
}

.toggle-btn {
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  background:#ccc;
}
.toggle-btn.active {
  background:#e67e22;
  color:#fff;
}
</style>
</head>

<body>

<div id="map"></div>
<div id="list"></div>

<div class="selected-list">
<b>選択ルート</b>
<div id="selected"></div>

<button id="toggleStart" class="toggle-btn active" onclick="toggleStartMode()">
現在地から：ON
</button>

<button onclick="generateRoute()" class="route-btn">
GoogleMapで開く
</button>
</div>

<script>

const MAPTILER_KEY = "5803br5MI3qRfp9DVSHL";

let onsens = [];
let selected = [];
let map;
let startFromCurrent = true;

/* ===== CSV読み込み ===== */
async function loadCSV(){
  const res = await fetch("onsen.csv");
  let text = await res.text();
  text = text.replace(/^\uFEFF/, '');

  const lines = text.trim().split(/\r?\n/);

  onsens = lines.slice(1).map(line=>{
    const cols = line.split(",");
    return {
      name: cols[0].trim(),
      lat: Number(cols[1]),
      lng: Number(cols[2]),
      type: cols[3]
    };
  });
}

/* ===== 初期化 ===== */
async function initMap(){

  await loadCSV();

  map = new maplibregl.Map({
    container:'map',
    style:`https://api.maptiler.com/maps/streets/style.json?key=${MAPTILER_KEY}`,
    center:[135.15,34.75],
    zoom:6
  });

  map.addControl(new maplibregl.NavigationControl());

  map.on('load', () => {
    map.resize();
    setupSource();
    renderList();
  });
}

initMap();

/* ===== GeoJSON + cluster ===== */
function setupSource(){

  const geojson = {
    type: 'FeatureCollection',
    features: onsens.map((o,i)=>({
      type:'Feature',
      geometry:{
        type:'Point',
        coordinates:[o.lng, o.lat]
      },
      properties:{
        id: i,
        name: o.name,
        type: o.type
      }
    }))
  };

  map.addSource('onsens', {
    type:'geojson',
    data: geojson,
    cluster:true,
    clusterMaxZoom:10,
    clusterRadius:50
  });

  /* 色定義 */
  const typeColor = [
    'match',
    ['get','type'],
    '塩化物泉', '#e74c3c',
    '炭酸泉', '#3498db',
    '単純温泉', '#7f8c8d',
    '含鉄泉', '#d2691e',
    '#95a5a6'
  ];

  /* クラスター */
  map.addLayer({
    id:'clusters',
    type:'circle',
    source:'onsens',
    filter:['has','point_count'],
    paint:{
      'circle-color':'#e67e22',
      'circle-radius':[
        'step',['get','point_count'],
        15,10,20,30,25
      ]
    }
  });

  map.addLayer({
    id:'cluster-count',
    type:'symbol',
    source:'onsens',
    filter:['has','point_count'],
    layout:{
      'text-field':['get','point_count'],
      'text-size':12
    }
  });

  /* 通常ポイント */
  map.addLayer({
    id:'unclustered',
    type:'circle',
    source:'onsens',
    filter:['!has','point_count'],
    paint:{
      'circle-color': typeColor,
      'circle-radius': [
        'interpolate',['linear'],['zoom'],
        5,4,
        10,7,
        15,10
      ],
      'circle-stroke-width': 1,
      'circle-stroke-color': '#fff'
    }
  });

  /* 選択ポイント */
  map.addLayer({
    id:'selected-points',
    type:'circle',
    source:'onsens',
    filter:['in','id', -1],
    paint:{
      'circle-color':'#000',
      'circle-radius': [
        'interpolate',['linear'],['zoom'],
        5,8,
        10,12,
        15,16
      ],
      'circle-stroke-width': 3,
      'circle-stroke-color':'#fff'
    }
  });

  map.moveLayer('selected-points');

  /* クラスタクリック */
  map.on('click','clusters', (e)=>{
    const features = map.queryRenderedFeatures(e.point,{layers:['clusters']});
    const clusterId = features[0].properties.cluster_id;

    map.getSource('onsens').getClusterExpansionZoom(clusterId, (err, zoom)=>{
      if(err) return;
      map.easeTo({
        center: features[0].geometry.coordinates,
        zoom: zoom
      });
    });
  });

  /* 単体クリック */
  map.on('click','unclustered', (e)=>{
    const id = Number(e.features[0].properties.id);
    toggle(id);
  });

  map.on('mouseenter','unclustered',()=>map.getCanvas().style.cursor='pointer');
  map.on('mouseleave','unclustered',()=>map.getCanvas().style.cursor='');
}

/* ===== 選択反映 ===== */
function updateSelectedLayer(){
  map.setFilter('selected-points', [
    'in','id', ...selected
  ]);
}

/* ===== リスト ===== */
function renderList(){
  const list = document.getElementById("list");
  list.innerHTML="";

  onsens.forEach((o,i)=>{
    const div=document.createElement("div");
    div.className="card";
    if(selected.includes(i)) div.classList.add("active");

    div.innerHTML=`<b>${o.name}</b>`;
    div.onclick=()=>toggle(i);

    list.appendChild(div);
  });

  renderSelected();
}

/* ===== 選択 ===== */
function toggle(i){
  if(selected.includes(i)){
    selected = selected.filter(x=>x!==i);
  }else{
    selected.push(i);
  }

  updateSelectedLayer();
  renderList();
}

/* ===== 並び替え ===== */
function renderSelected(){
  const el=document.getElementById("selected");
  el.innerHTML="";

  selected.forEach(i=>{
    const item=document.createElement("div");
    item.className="selected-item";
    item.dataset.id=i;
    item.innerText=onsens[i].name;
    el.appendChild(item);
  });

  new Sortable(el,{
    animation:150,
    onEnd:()=>{
      selected=[...el.children].map(e=>parseInt(e.dataset.id));
      updateSelectedLayer();
      renderList();
    }
  });
}

/* ===== 出発地切替 ===== */
function toggleStartMode(){
  startFromCurrent=!startFromCurrent;
  const btn=document.getElementById("toggleStart");
  btn.classList.toggle("active",startFromCurrent);
  btn.innerText="現在地から：" + (startFromCurrent ? "ON" : "OFF");
}

/* ===== ルート生成 ===== */
function generateRoute(){
  if(selected.length<1) return;

  const route=selected.map(i=>onsens[i]);
  const names=route.map(o=>encodeURIComponent(o.name));

  let url;

  if(startFromCurrent){
    url=`https://www.google.com/maps/dir/?api=1&origin=Current+Location&destination=${names.at(-1)}&waypoints=${names.slice(0,-1).join('|')}`;
  }else{
    url=`https://www.google.com/maps/dir/?api=1&origin=${names[0]}&destination=${names.at(-1)}&waypoints=${names.slice(1,-1).join('|')}`;
  }

  window.open(url);
}

</script>

</body>
</html>
