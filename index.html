<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>温泉マップ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<style>
body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
  background:#f2f2f7;
  color:#1c1c1e;
}

/* ===== マップ ===== */
#map {
  position:fixed;
  top:0;
  width:100%;
  height:65vh;
}

/* ===== Apple風カード ===== */
.main {
  margin-top:65vh;
  padding:12px;
}

.selected-container {
  backdrop-filter: blur(20px);
  background:rgba(255,255,255,0.75);
  border-radius:16px;
  padding:14px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.selected-title {
  font-weight:600;
  font-size:14px;
  margin-bottom:6px;
}

.selected-item {
  padding:10px;
  margin:6px 0;
  background:rgba(0,0,0,0.05);
  border-radius:10px;
  font-size:13px;
}

/* ===== フッター ===== */
.footer {
  position:fixed;
  bottom:0;
  width:100%;
  backdrop-filter: blur(20px);
  background:rgba(255,255,255,0.75);
  border-top:1px solid rgba(0,0,0,0.1);
  padding:10px;
  display:flex;
  justify-content:center;
  gap:10px;
}

.route-btn {
  padding:12px 20px;
  background:#007aff;
  color:#fff;
  border:none;
  border-radius:12px;
}

.toggle-btn {
  padding:10px 14px;
  background:#d1d1d6;
  border:none;
  border-radius:12px;
}

.toggle-btn.active {
  background:#34c759;
  color:#fff;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="main">
  <div class="selected-container">
    <div class="selected-title">選択ルート</div>
    <div id="selected"></div>
  </div>
</div>

<div class="footer">
  <button onclick="generateRoute()" class="route-btn">GoogleMap</button>
  <button id="toggleStart" class="toggle-btn active" onclick="toggleStartMode()">現在地</button>
</div>

<script>

const MAPTILER_KEY = "5803br5MI3qRfp9DVSHL";

let onsens = [];
let selected = [];
let map;

/* ===== 泉質カラー ===== */
const typeColorMap = {
  "塩化物泉":"#e74c3c",
  "炭酸泉":"#3498db",
  "単純温泉":"#95a5a6",
  "含鉄泉":"#d35400"
};

/* ===== CSV ===== */
async function loadCSV(){
  const res = await fetch("onsen.csv");
  const text = await res.text();
  const lines = text.trim().split(/\r?\n/);

  onsens = lines.slice(1).map(line=>{
    const c = line.split(",");
    return {
      name:c[0],
      lat:+c[1],
      lng:+c[2],
      type:c[3]
    };
  });
}

/* ===== 初期化 ===== */
async function initMap(){
  await loadCSV();

  map = new maplibregl.Map({
    container:'map',
    style:`https://api.maptiler.com/maps/streets/style.json?key=${MAPTILER_KEY}`,
    center:[135.15,34.75],
    zoom:6
  });

  map.on('load', ()=>{
    setup();
    renderSelected();
  });
}

initMap();

/* ===== Source ===== */
function setup(){

  map.addSource('onsens',{
    type:'geojson',
    data:geo(),
    cluster:true,
    clusterRadius:50
  });

  /* ===== クラスタ（選択含有で色変更） */
  map.addLayer({
    id:'clusters',
    type:'circle',
    source:'onsens',
    filter:['has','point_count'],
    paint:{
      'circle-color':[
        'case',
        ['>', ['get','selectedCount'], 0],
        '#ff9500',   // 選択あり
        '#8e8e93'    // 通常
      ],
      'circle-radius':20
    }
  });

  map.addLayer({
    id:'cluster-count',
    type:'symbol',
    source:'onsens',
    filter:['has','point_count'],
    layout:{
      'text-field':['get','point_count']
    },
    paint:{ 'text-color':'#fff' }
  });

  /* ===== 温泉ピン（♨） ===== */
  map.addLayer({
    id:'onsen-icon',
    type:'symbol',
    source:'onsens',
    filter:['!has','point_count'],
    layout:{
      'text-field':'♨',
      'text-size':18
    },
    paint:{
      'text-color':[
        'case',
        ['in',['get','id'],['literal',selected]],
        '#ff3b30', // 選択
        ['get','color'] // 泉質
      ]
    }
  });

  /* ===== 名前 ===== */
  map.addLayer({
    id:'label',
    type:'symbol',
    source:'onsens',
    filter:['!has','point_count'],
    layout:{
      'text-field':['get','name'],
      'text-size':10,
      'text-offset':[0,1.2]
    },
    paint:{
      'text-halo-color':'#fff',
      'text-halo-width':3
    }
  });

  map.on('click','onsen-icon',e=>{
    toggle(e.features[0].properties.id);
  });
}

/* ===== GeoJSON ===== */
function geo(){
  return {
    type:'FeatureCollection',
    features: onsens.map((o,i)=>({
      type:'Feature',
      geometry:{type:'Point',coordinates:[o.lng,o.lat]},
      properties:{
        id:i,
        name:o.name,
        color:typeColorMap[o.type] || '#7f8c8d'
      }
    }))
  };
}

/* ===== 更新 ===== */
function update(){
  map.getSource('onsens').setData(geo());
}

/* ===== UI ===== */
function renderSelected(){
  const el=document.getElementById("selected");
  el.innerHTML="";

  selected.forEach(i=>{
    const d=document.createElement("div");
    d.className="selected-item";
    d.dataset.id=i;
    d.innerText=onsens[i].name;
    el.appendChild(d);
  });

  new Sortable(el,{
    animation:150,
    onEnd:()=>{
      selected=[...el.children].map(e=>+e.dataset.id);
      update();
    }
  });
}

function toggle(i){
  selected.includes(i)
    ? selected=selected.filter(x=>x!==i)
    : selected.push(i);

  update();
  renderSelected();
}

/* ===== ボタン ===== */
function toggleStartMode(){
  document.getElementById("toggleStart").classList.toggle("active");
}

function generateRoute(){
  if(!selected.length) return;

  const names=selected.map(i=>encodeURIComponent(onsens[i].name));
  const url=`https://www.google.com/maps/dir/?api=1&origin=Current+Location&destination=${names.at(-1)}&waypoints=${names.slice(0,-1).join('|')}`;
  window.open(url);
}

</script>
</body>
</html>
