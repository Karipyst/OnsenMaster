<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>温泉マップ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<style>
body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
  background:#f2f2f7;
}

#map {
  position:fixed;
  top:0;
  width:100%;
  height:65vh;
}

.main {
  margin-top:65vh;
  padding:12px;
}

.selected-container {
  backdrop-filter: blur(20px);
  background:rgba(255,255,255,0.75);
  border-radius:16px;
  padding:14px;
}

.selected-item {
  padding:10px;
  margin:6px 0;
  background:rgba(0,0,0,0.05);
  border-radius:10px;
}

.footer {
  position:fixed;
  bottom:0;
  width:100%;
  backdrop-filter: blur(20px);
  background:rgba(255,255,255,0.75);
  padding:10px;
  display:flex;
  justify-content:center;
  gap:10px;
}

.route-btn {
  padding:12px 20px;
  background:#007aff;
  color:#fff;
  border:none;
  border-radius:12px;
}

.toggle-btn {
  padding:10px;
  background:#d1d1d6;
  border:none;
  border-radius:12px;
}

.toggle-btn.active {
  background:#34c759;
  color:#fff;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="main">
  <div class="selected-container">
    <div>選択ルート</div>
    <div id="selected"></div>
  </div>
</div>

<div class="footer">
  <button onclick="generateRoute()" class="route-btn">GoogleMap</button>
  <button id="toggleStart" class="toggle-btn active" onclick="toggleStartMode()">現在地</button>
</div>

<script>

const MAPTILER_KEY = "5803br5MI3qRfp9DVSHL";

let onsens = [];
let selected = [];
let map;
let startFromCurrent = true;

/* ===== 泉質カラー ===== */
const typeColor = {
  "塩化物泉":"#e74c3c",
  "炭酸泉":"#3498db",
  "単純温泉":"#95a5a6",
  "含鉄泉":"#d35400"
};

/* ===== CSV ===== */
async function loadCSV(){
  const res = await fetch("onsen.csv");
  const text = await res.text();
  const lines = text.trim().split(/\r?\n/);

  onsens = lines.slice(1).map(line=>{
    const c = line.split(",");
    return {
      name:c[0],
      lat:+c[1],
      lng:+c[2],
      type:c[3]
    };
  });
}

/* ===== 初期化 ===== */
async function init(){
  await loadCSV();

  map = new maplibregl.Map({
    container:'map',
    style:`https://api.maptiler.com/maps/streets/style.json?key=${MAPTILER_KEY}`,
    center:[135.15,34.75],
    zoom:6
  });

  map.on('load',()=>{
    setup();
    renderSelected();
  });
}

init();

/* ===== Source ===== */
function setup(){

  map.addSource('onsen',{
    type:'geojson',
    data:geo(),
    cluster:true,
    clusterRadius:50,
    clusterProperties:{
      selectedCount:[
        "+",
        ["case", ["in", ["get","id"], ["literal", selected]], 1, 0]
      ]
    }
  });

  /* クラスタ */
  map.addLayer({
    id:'cluster',
    type:'circle',
    source:'onsen',
    filter:['has','point_count'],
    paint:{
      'circle-color':[
        'case',
        ['>', ['get','selectedCount'], 0],
        '#ff9500',
        '#636e72'
      ],
      'circle-radius':18
    }
  });

  map.addLayer({
    id:'cluster-count',
    type:'symbol',
    source:'onsen',
    filter:['has','point_count'],
    layout:{ 'text-field':['get','point_count'] },
    paint:{ 'text-color':'#fff' }
  });

  /* 通常ピン */
  map.addLayer({
    id:'points',
    type:'circle',
    source:'onsen',
    filter:['!has','point_count'],
    paint:{
      'circle-color':['get','color'],
      'circle-radius':8,
      'circle-stroke-width':1,
      'circle-stroke-color':'#fff'
    }
  });

  /* 選択ピン */
  map.addLayer({
    id:'selected',
    type:'circle',
    source:'onsen',
    filter:['in','id',-1],
    paint:{
      'circle-color':['get','color'],
      'circle-radius':14,
      'circle-stroke-width':3,
      'circle-stroke-color':'#f1c40f'
    }
  });

  /* 順番表示 */
  map.addLayer({
    id:'order-label',
    type:'symbol',
    source:'onsen',
    filter:['in','id',-1],
    layout:{
      'text-field':['get','order'],
      'text-size':11
    },
    paint:{
      'text-color':'#fff'
    }
  });

  /* 名前 */
  map.addLayer({
    id:'label',
    type:'symbol',
    source:'onsen',
    filter:['!has','point_count'],
    layout:{
      'text-field':['get','name'],
      'text-size':10,
      'text-offset':[0,1.2]
    },
    paint:{
      'text-halo-color':'#fff',
      'text-halo-width':2
    }
  });

  map.on('click','points',e=>{
    toggle(e.features[0].properties.id);
  });

  map.on('click','cluster',e=>{
    const f = map.queryRenderedFeatures(e.point,{layers:['cluster']})[0];
    const id = f.properties.cluster_id;

    map.getSource('onsen').getClusterExpansionZoom(id,(err,zoom)=>{
      map.easeTo({center:f.geometry.coordinates, zoom});
    });
  });
}

/* ===== GeoJSON ===== */
function geo(){
  return {
    type:'FeatureCollection',
    features: onsens.map((o,i)=>({
      type:'Feature',
      geometry:{type:'Point',coordinates:[o.lng,o.lat]},
      properties:{
        id:i,
        name:o.name,
        color:typeColor[o.type] || '#7f8c8d',
        order: selected.includes(i) ? String(selected.indexOf(i)+1) : ""
      }
    }))
  };
}

/* ===== 更新 ===== */
function update(){
  map.getSource('onsen').setData(geo());
  map.setFilter('selected',['in','id',...selected]);
  map.setFilter('order-label',['in','id',...selected]);
}

/* ===== UI ===== */
function renderSelected(){
  const el=document.getElementById("selected");
  el.innerHTML="";

  selected.forEach(i=>{
    const d=document.createElement("div");
    d.className="selected-item";
    d.dataset.id=i;
    d.innerText=onsens[i].name;
    el.appendChild(d);
  });

  new Sortable(el,{
    animation:150,
    onEnd:()=>{
      selected=[...el.children].map(e=>+e.dataset.id);
      update();
    }
  });
}

function toggle(i){
  selected.includes(i)
    ? selected=selected.filter(x=>x!==i)
    : selected.push(i);

  update();
  renderSelected();
}

/* ===== 現在地トグル ===== */
function toggleStartMode(){
  startFromCurrent=!startFromCurrent;
  document.getElementById("toggleStart").classList.toggle("active",startFromCurrent);
}

/* ===== ルート生成 ===== */
function generateRoute(){
  if(!selected.length) return;

  const names=selected.map(i=>encodeURIComponent(onsens[i].name));

  let url;

  if(startFromCurrent){
    url=`https://www.google.com/maps/dir/?api=1&origin=Current+Location&destination=${names.at(-1)}&waypoints=${names.slice(0,-1).join('|')}`;
  }else{
    url=`https://www.google.com/maps/dir/?api=1&origin=${names[0]}&destination=${names.at(-1)}&waypoints=${names.slice(1,-1).join('|')}`;
  }

  window.open(url);
}

</script>
</body>
</html>
