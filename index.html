<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>温泉マップ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<style>
body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:#f2f2f7;
}
#map { position:fixed; top:0; width:100%; height:65vh; }

.main { margin-top:65vh; padding:12px; }

.selected-container {
  backdrop-filter: blur(20px);
  background:rgba(255,255,255,0.75);
  border-radius:16px;
  padding:14px;
}

.selected-item {
  padding:10px;
  margin:6px 0;
  background:rgba(0,0,0,0.05);
  border-radius:10px;
}

.footer {
  position:fixed;
  bottom:0;
  width:100%;
  backdrop-filter: blur(20px);
  background:rgba(255,255,255,0.75);
  padding:10px;
  display:flex;
  justify-content:center;
  gap:10px;
}

.route-btn {
  padding:12px 20px;
  background:#007aff;
  color:#fff;
  border:none;
  border-radius:12px;
}

.toggle-btn {
  padding:10px;
  background:#d1d1d6;
  border:none;
  border-radius:12px;
}

.toggle-btn.active {
  background:#34c759;
  color:#fff;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="main">
  <div class="selected-container">
    <div>選択ルート</div>
    <div id="selected"></div>
  </div>
</div>

<div class="footer">
  <button onclick="generateRoute()" class="route-btn">GoogleMap</button>
  <button onclick="drawRoute()" class="route-btn">地図に表示</button>
  <button id="toggleStart" class="toggle-btn active" onclick="toggleStartMode()">現在地</button>
</div>

<script>

const MAPTILER_KEY = "5803br5MI3qRfp9DVSHL";

let onsens = [];
let selected = [];
let map;
let startFromCurrent = true;

const typeColor = {
  "塩化物泉":"#e74c3c",
  "炭酸泉":"#3498db",
  "単純温泉":"#95a5a6",
  "含鉄泉":"#d35400"
};

async function loadCSV(){
  const res = await fetch("onsen.csv");
  const text = await res.text();
  const lines = text.trim().split(/\r?\n/);

  onsens = lines.slice(1).map(line=>{
    const c = line.split(",");
    return { name:c[0], lat:+c[1], lng:+c[2], type:c[3] };
  });
}

async function init(){
  await loadCSV();

  map = new maplibregl.Map({
    container:'map',
    style:`https://api.maptiler.com/maps/streets/style.json?key=${MAPTILER_KEY}`,
    center:[135.15,34.75],
    zoom:6
  });

  map.on('load',()=>{
    setup();
    renderSelected();

    /* ルートレイヤー */
    map.addSource('route',{ type:'geojson', data:{type:'FeatureCollection',features:[]} });

    map.addLayer({
      id:'route-line',
      type:'line',
      source:'route',
      paint:{
        'line-color':'#007aff',
        'line-width':5
      }
    });
  });
}

init();

function setup(){

  map.addSource('onsen',{
    type:'geojson',
    data:geo(),
    cluster:true
  });

  map.addLayer({
    id:'cluster',
    type:'circle',
    source:'onsen',
    filter:['has','point_count'],
    paint:{ 'circle-color':'#636e72','circle-radius':18 }
  });

  map.addLayer({
    id:'cluster-count',
    type:'symbol',
    source:'onsen',
    filter:['has','point_count'],
    layout:{ 'text-field':['get','point_count'] },
    paint:{ 'text-color':'#fff' }
  });

  map.addLayer({
    id:'points',
    type:'circle',
    source:'onsen',
    filter:['!has','point_count'],
    paint:{
      'circle-color':['get','color'],
      'circle-radius':8,
      'circle-stroke-width':1,
      'circle-stroke-color':'#fff'
    }
  });

  map.addLayer({
    id:'selected',
    type:'circle',
    source:'onsen',
    filter:['in','id',-1],
    paint:{
      'circle-color':['get','color'],
      'circle-radius':14,
      'circle-stroke-width':3,
      'circle-stroke-color':'#f1c40f'
    }
  });

  map.addLayer({
    id:'order',
    type:'symbol',
    source:'onsen',
    filter:['in','id',-1],
    layout:{ 'text-field':['get','order'], 'text-size':11 },
    paint:{ 'text-color':'#fff' }
  });

  map.on('click','points',e=>{
    toggle(e.features[0].properties.id);
  });

  map.on('click','cluster',e=>{
    const f = map.queryRenderedFeatures(e.point,{layers:['cluster']})[0];
    map.getSource('onsen').getClusterExpansionZoom(f.properties.cluster_id,(err,zoom)=>{
      map.easeTo({center:f.geometry.coordinates, zoom});
    });
  });
}

function geo(){
  return {
    type:'FeatureCollection',
    features: onsens.map((o,i)=>({
      type:'Feature',
      geometry:{type:'Point',coordinates:[o.lng,o.lat]},
      properties:{
        id:i,
        name:o.name,
        color:typeColor[o.type] || '#7f8c8d',
        order: selected.includes(i) ? String(selected.indexOf(i)+1) : ""
      }
    }))
  };
}

function update(){
  map.getSource('onsen').setData(geo());
  map.setFilter('selected',['in','id',...selected]);
  map.setFilter('order',['in','id',...selected]);
}

/* ===== ルート描画（OSRM） ===== */
async function drawRoute(){

  if(selected.length < 2) return;

  const coords = selected.map(i=>{
    const o = onsens[i];
    return `${o.lng},${o.lat}`;
  }).join(';');

  const url = `https://router.project-osrm.org/route/v1/driving/${coords}?overview=full&geometries=geojson`;

  const res = await fetch(url);
  const data = await res.json();

  const route = data.routes[0].geometry;

  map.getSource('route').setData({
    type:'Feature',
    geometry:route
  });
}

/* ===== UI ===== */
function renderSelected(){
  const el=document.getElementById("selected");
  el.innerHTML="";

  selected.forEach(i=>{
    const d=document.createElement("div");
    d.className="selected-item";
    d.dataset.id=i;
    d.innerText=onsens[i].name;
    el.appendChild(d);
  });

  new Sortable(el,{
    animation:150,
    onEnd:()=>{
      selected=[...el.children].map(e=>+e.dataset.id);
      update();
    }
  });
}

function toggle(i){
  selected.includes(i)
    ? selected=selected.filter(x=>x!==i)
    : selected.push(i);

  update();
  renderSelected();
}

function toggleStartMode(){
  startFromCurrent=!startFromCurrent;
  document.getElementById("toggleStart").classList.toggle("active",startFromCurrent);
}

function generateRoute(){
  if(!selected.length) return;

  const names=selected.map(i=>encodeURIComponent(onsens[i].name));

  let url;

  if(startFromCurrent){
    url=`https://www.google.com/maps/dir/?api=1&origin=Current+Location&destination=${names.at(-1)}&waypoints=${names.slice(0,-1).join('|')}`;
  }else{
    url=`https://www.google.com/maps/dir/?api=1&origin=${names[0]}&destination=${names.at(-1)}&waypoints=${names.slice(1,-1).join('|')}`;
  }

  window.open(url);
}

</script>
</body>
</html>
