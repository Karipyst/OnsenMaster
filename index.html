<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>温泉マップ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<style>
body { margin:0; font-family:sans-serif; background:#f5f1e6; }
#map { height:45vh; }

.card {
  margin:10px; padding:15px;
  background:#fff; border-radius:12px;
  cursor:pointer; border:2px solid transparent;
}
.card.active {
  border:2px solid #e67e22;
  background:#fff7ed;
}

.selected-list {
  margin:10px; padding:10px;
  background:#fff; border-radius:12px;
}
.selected-item {
  padding:10px; margin:5px 0;
  background:#eee; border-radius:8px;
  cursor:grab;
}

.route-btn {
  width:100%; padding:14px;
  margin-top:10px;
  font-size:16px;
  background:#e67e22;
  color:#fff;
  border:none;
}

.toggle-btn {
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  background:#ccc;
}
.toggle-btn.active {
  background:#e67e22;
  color:#fff;
}

/* マーカー */
.marker {
  position: relative;
  width: 30px;
  height: 30px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  color:#fff;
  font-size:16px;
}
.marker.selected {
  transform:scale(1.2);
  border:2px solid #fff;
  box-shadow:0 0 6px rgba(0,0,0,0.5);
}

.marker-number {
  position:absolute;
  top:-8px;
  left:-8px;
  background:#000;
  color:#fff;
  font-size:10px;
  width:18px;
  height:18px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

.type-塩化物泉 { background:#e74c3c; }
.type-炭酸泉 { background:#3498db; }
.type-単純温泉 { background:#7f8c8d; }
.type-含鉄泉 { background:#d2691e; }

</style>
</head>

<body>

<div id="map"></div>
<div id="list"></div>

<div class="selected-list">
<b>選択ルート</b>
<div id="selected"></div>

<button id="toggleStart" class="toggle-btn active" onclick="toggleStartMode()">
現在地から：ON
</button>

<button onclick="generateRoute()" class="route-btn">
GoogleMapで開く
</button>
</div>

<script>

const MAPTILER_KEY = "5803br5MI3qRfp9DVSHL";

let onsens = [];
let selected = [];
let map;
let markers = [];
let startFromCurrent = true;

/* ===== CSV読み込み（完全安全版） ===== */
async function loadCSV(){
  const res = await fetch("onsen.csv");
  let text = await res.text();

  text = text.replace(/^\uFEFF/, '');
  const lines = text.trim().split(/\r?\n/);

  const delimiter = lines[0].includes(",") ? "," :
                    lines[0].includes(";") ? ";" : "\t";

  const headers = lines[0].split(delimiter).map(h=>h.trim());

  const idx = {
    name: headers.indexOf("name"),
    lat: headers.indexOf("lat"),
    lng: headers.indexOf("lng"),
    type: headers.indexOf("type")
  };

  onsens = lines.slice(1).map(line=>{
    const cols = line.split(delimiter);

    return {
      name: cols[idx.name].trim(),
      lat: Number(cols[idx.lat].trim()),
      lng: Number(cols[idx.lng].trim()),
      type: cols[idx.type].trim()
    };
  });

  console.log("onsens:", onsens);
}

/* ===== 初期化（rasterでズレ完全防止） ===== */
async function initMap(){

  await loadCSV();

  map = new maplibregl.Map({
    container:'map',

    style: {
      version: 8,
      sources: {
        "raster-tiles": {
          type: "raster",
          tiles: [
            `https://api.maptiler.com/maps/basic/{z}/{x}/{y}.png?key=${MAPTILER_KEY}`
          ],
          tileSize: 256
        }
      },
      layers: [
        {
          id: "simple-tiles",
          type: "raster",
          source: "raster-tiles"
        }
      ]
    },

    center:[135.15,34.75],
    zoom:9
  });

  map.addControl(new maplibregl.NavigationControl());

  map.on('load', render);
}

initMap();

/* ===== 描画 ===== */
function render(){

  document.getElementById("list").innerHTML="";
  markers.forEach(m=>m.remove());
  markers=[];

  onsens.forEach((o,i)=>{

    const el = document.createElement("div");
    el.className = `marker type-${o.type}`;
    el.innerHTML = "♨";

    const orderIndex = selected.indexOf(i);
    if(orderIndex !== -1){
      el.classList.add("selected");

      const num = document.createElement("div");
      num.className = "marker-number";
      num.innerText = orderIndex + 1;
      el.appendChild(num);
    }

    const marker = new maplibregl.Marker({
      element: el,
      anchor: 'bottom'
    })
      .setLngLat([o.lng, o.lat])
      .setPopup(new maplibregl.Popup().setText(o.name))
      .addTo(map);

    markers.push(marker);

    const div = document.createElement("div");
    div.className="card";
    if(selected.includes(i)) div.classList.add("active");

    div.onclick=()=>toggle(i);
    div.innerHTML=`<b>${o.name}</b>`;

    document.getElementById("list").appendChild(div);
  });

  renderSelected();
}

/* ===== 選択 ===== */
function toggle(i){
  if(selected.includes(i)){
    selected = selected.filter(x=>x!==i);
  }else{
    selected.push(i);
  }
  render();
}

/* ===== 並び替え ===== */
function renderSelected(){
  const el=document.getElementById("selected");
  el.innerHTML="";

  selected.forEach(i=>{
    const item=document.createElement("div");
    item.className="selected-item";
    item.dataset.id=i;
    item.innerText=onsens[i].name;
    el.appendChild(item);
  });

  new Sortable(el,{
    animation:150,
    onEnd:()=>{
      selected=[...el.children].map(e=>parseInt(e.dataset.id));
      render();
    }
  });
}

/* ===== 出発地切替 ===== */
function toggleStartMode(){
  startFromCurrent=!startFromCurrent;
  const btn=document.getElementById("toggleStart");
  btn.classList.toggle("active",startFromCurrent);
  btn.innerText="現在地から：" + (startFromCurrent ? "ON" : "OFF");
}

/* ===== ルート生成 ===== */
function generateRoute(){
  if(selected.length<1) return;

  const route=selected.map(i=>onsens[i]);
  const names=route.map(o=>encodeURIComponent(o.name));

  let url;

  if(startFromCurrent){
    url=`https://www.google.com/maps/dir/?api=1&origin=Current+Location&destination=${names.at(-1)}&waypoints=${names.slice(0,-1).join('|')}`;
  }else{
    url=`https://www.google.com/maps/dir/?api=1&origin=${names[0]}&destination=${names.at(-1)}&waypoints=${names.slice(1,-1).join('|')}`;
  }

  window.open(url);
}

</script>

</body>
</html>
